<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="시각장애인 스포츠 쇼다운 대회 관리 앱">
    <meta name="theme-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="쇼다운">
    <link rel="manifest" href="/manifest.webmanifest">
    <title>쇼다운 대회 관리</title>
    <script>
      // 경로에 따라 모드별 manifest 동적 교체
      (function() {
        var path = location.pathname;
        var manifest = document.querySelector('link[rel="manifest"]');
        if (!manifest) return;
        if (path.indexOf('/spectator') !== -1) {
          manifest.href = '/manifest-spectator.json';
          document.title = '쇼다운 관람';
          document.querySelector('meta[name="theme-color"]').content = '#1a73e8';
          document.querySelector('meta[name="apple-mobile-web-app-title"]').content = '쇼다운 관람';
        } else if (path.indexOf('/referee') !== -1) {
          manifest.href = '/manifest-referee.json';
          document.title = '쇼다운 심판';
          document.querySelector('meta[name="theme-color"]').content = '#f59e0b';
          document.querySelector('meta[name="apple-mobile-web-app-title"]').content = '쇼다운 심판';
        } else if (path.indexOf('/admin') !== -1) {
          manifest.href = '/manifest-admin.json';
          document.title = '쇼다운 관리';
          document.querySelector('meta[name="theme-color"]').content = '#ef4444';
          document.querySelector('meta[name="apple-mobile-web-app-title"]').content = '쇼다운 관리';
        }
      })();
    </script>
</head>
<body>
    <div id="root"></div>
    <script>
      // GitHub Pages SPA: restore path from 404.html redirect
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location));
    </script>
    <script type="module" src="/src/app/main.tsx"></script>
</body>
</html>
