<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <title>쇼다운 대회 관리</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #000;
        color: #fff;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      h1 {
        font-size: 2.5rem;
        margin-bottom: 1rem;
        color: #FFFF00;
        text-align: center;
      }
      p {
        font-size: 1.25rem;
        margin-bottom: 3rem;
        opacity: 0.8;
        text-align: center;
      }
      .buttons {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
        width: 100%;
        max-width: 400px;
      }
      a {
        display: block;
        padding: 1.5rem 2rem;
        font-size: 1.5rem;
        font-weight: bold;
        text-align: center;
        text-decoration: none;
        border-radius: 12px;
        transition: transform 0.2s, box-shadow 0.2s;
      }
      a:hover {
        transform: scale(1.02);
      }
      .admin {
        background: #FF6600;
        color: #000;
      }
      .viewer {
        background: #00CCFF;
        color: #000;
      }
      .subtitle {
        font-size: 1rem;
        font-weight: normal;
        opacity: 0.8;
        margin-top: 0.5rem;
      }
    </style>
  </head>
  <body>
    <h1>쇼다운 대회 관리</h1>
    <p>시각장애인 스포츠 쇼다운 대회 진행 시스템</p>
    <div class="buttons">
      <a href="/admin.html" class="admin">
        관리자 / 심판
        <div class="subtitle">대회 관리, 점수 입력</div>
      </a>
      <a href="/viewer.html" class="viewer">
        관람
        <div class="subtitle">대진표, 실시간 점수 조회</div>
      </a>
    </div>
  </body>
</html>
