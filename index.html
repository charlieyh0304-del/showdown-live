<!DOCTYPE html>
<html>
<head>
    <script>
      // Set html lang before any content renders (for screen readers)
      (function() {
        var lang = localStorage.getItem('showdown_language') || 'ko';
        var l = lang === 'en' ? 'en' : 'ko';
        document.documentElement.lang = l;
        // Also set title early for screen readers
        var titles = { ko: '쇼다운 대회 관리', en: 'Showdown Tournament Manager' };
        document.title = titles[l] || titles.ko;
      })();
    </script>
    <meta charset="UTF-8">
    <script>
      // 강제 캐시 무효화 (SW 캐시 포함) - 버전이 바뀌면 1회 실행
      (function() {
        var v = 'showdown_cache_v5';
        if (!localStorage.getItem(v) && 'caches' in window) {
          caches.keys().then(function(names) {
            return Promise.all(names.map(function(n) { return caches.delete(n); }));
          }).then(function() {
            if (navigator.serviceWorker) {
              navigator.serviceWorker.getRegistrations().then(function(regs) {
                regs.forEach(function(r) { r.unregister(); });
                localStorage.setItem(v, '1');
                location.reload();
              });
            } else {
              localStorage.setItem(v, '1');
              location.reload();
            }
          });
        }
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Showdown - Tournament Management for Visually Impaired Table Sport">
    <meta name="theme-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="쇼다운">
    <link rel="apple-touch-icon" href="/icons/icon-152.png">
    <title>Showdown</title>
    <script>
      // 1) 이전 커스텀 service-worker.js 강제 해제 (showdown-v* 캐시 사용하던 SW)
      (function() {
        if (!('serviceWorker' in navigator)) return;
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          regs.forEach(function(reg) {
            // VitePWA가 생성한 sw.js가 아닌 다른 SW는 해제
            if (reg.active && reg.active.scriptURL && reg.active.scriptURL.indexOf('/sw.js') === -1) {
              reg.unregister();
            }
          });
        });
      })();

      // 2) 앱 버전 — 빌드 시마다 자동 변경되어 캐시를 초기화합니다
      (function() {
        var APP_VERSION = '__APP_VERSION__';
        var key = 'showdown_app_version';
        var saved = localStorage.getItem(key);
        if (saved !== APP_VERSION) {
          localStorage.setItem(key, APP_VERSION);
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(regs) {
              var promises = regs.map(function(r) { return r.unregister(); });
              Promise.all(promises).then(function() {
                return caches.keys().then(function(keys) {
                  return Promise.all(keys.map(function(k) { return caches.delete(k); }));
                });
              }).then(function() {
                location.href = location.pathname + '?_v=' + Date.now();
              });
            });
          } else {
            location.href = location.pathname + '?_v=' + Date.now();
          }
          return;
        }
      })();
    </script>
    <script>
      // 경로에 따라 모드별 manifest 동적 교체
      (function() {
        var path = location.pathname;
        // Detect base path from current URL (works on both / and /showdown-live/)
        var base = path.match(/^\/showdown-live/) ? '/showdown-live' : '';
        // Create manifest link dynamically (VitePWA also generates one, avoid duplicates)
        var manifest = document.querySelector('link[rel="manifest"]');
        if (!manifest) {
          manifest = document.createElement('link');
          manifest.rel = 'manifest';
          document.head.appendChild(manifest);
        }
        var lang = localStorage.getItem('showdown_language') || 'ko';
        var titles = {
          ko: { spectator: '쇼다운 관람', referee: '쇼다운 심판', admin: '쇼다운 관리' },
          en: { spectator: 'Showdown Spectator', referee: 'Showdown Referee', admin: 'Showdown Admin' }
        };
        var t = titles[lang] || titles.ko;
        if (path.indexOf('/spectator') !== -1) {
          manifest.href = base + '/manifest-spectator.json';
          document.title = t.spectator;
          document.querySelector('meta[name="theme-color"]').content = '#1a73e8';
          document.querySelector('meta[name="apple-mobile-web-app-title"]').content = t.spectator;
        } else if (path.indexOf('/referee') !== -1) {
          manifest.href = base + '/manifest-referee.json';
          document.title = t.referee;
          document.querySelector('meta[name="theme-color"]').content = '#f59e0b';
          document.querySelector('meta[name="apple-mobile-web-app-title"]').content = t.referee;
        } else if (path.indexOf('/admin') !== -1) {
          manifest.href = base + '/manifest-admin.json';
          document.title = t.admin;
          document.querySelector('meta[name="theme-color"]').content = '#ef4444';
          document.querySelector('meta[name="apple-mobile-web-app-title"]').content = t.admin;
        } else {
          // Default: use the VitePWA-generated manifest
          manifest.href = base + '/manifest.webmanifest';
        }
      })();
    </script>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/src/app/main.tsx"></script>
</body>
</html>
