<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>쇼다운 앱</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: white;
    }
    h1 { font-size: 2rem; margin-bottom: 8px; text-align: center; }
    p { opacity: 0.8; margin-bottom: 40px; text-align: center; }
    .apps { display: flex; flex-direction: column; gap: 16px; width: 100%; max-width: 400px; }
    .app-link {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px 24px;
      background: rgba(255,255,255,0.1);
      border-radius: 16px;
      text-decoration: none;
      color: white;
      transition: all 0.3s;
      border: 2px solid transparent;
    }
    .app-link:hover { background: rgba(255,255,255,0.15); transform: translateY(-2px); }
    .app-link.viewer { border-color: #9c27b0; }
    .app-link.referee { border-color: #ff9800; }
    .app-link.admin { border-color: #2196F3; }
    .app-icon { font-size: 2.5rem; }
    .app-info h2 { font-size: 1.2rem; margin-bottom: 4px; }
    .app-info span { font-size: 0.85rem; opacity: 0.7; }
    .arrow { margin-left: auto; opacity: 0.5; font-size: 1.5rem; }
  </style>
</head>
<body>
  <h1>쇼다운</h1>
  <p>역할에 맞는 앱을 선택하세요</p>
  <div class="apps">
    <a href="./viewer-app/dist/" class="app-link viewer">
      <span class="app-icon">👁️</span>
      <div class="app-info">
        <h2>관람 모드</h2>
        <span>실시간 점수, 순위, 대진표 확인</span>
      </div>
      <span class="arrow">→</span>
    </a>
    <a href="./referee-app/dist/" class="app-link referee">
      <span class="app-icon">🏓</span>
      <div class="app-info">
        <h2>심판 모드</h2>
        <span>경기 스코어링, 음성 안내</span>
      </div>
      <span class="arrow">→</span>
    </a>
    <a href="./admin-app/dist/" class="app-link admin">
      <span class="app-icon">🛠️</span>
      <div class="app-info">
        <h2>관리자 모드</h2>
        <span>대회 생성, 선수/조/경기 관리</span>
      </div>
      <span class="arrow">→</span>
    </a>
  </div>
</body>
</html>
