                const stats = calculateStatistics();
                if (stats.playerStats?.length > 0) {
                    stats.playerStats.forEach(s => {
                        html += `<div class="viewer-record-item" data-name="${s.name}" style="padding:12px; margin:8px 0; background:var(--bg-secondary); border-radius:8px;">`;
                        html += `<strong>${s.name}</strong>`;
                        html += `<div style="font-size:13px; margin-top:4px;">`;
                        html += `${s.wins}승 ${s.losses}패 (${s.winRate}%)`;
                        html += `</div></div>`;
                    });
                } else {
                    html += '<p style="text-align:center; padding:20px; color:var(--text-secondary);">개인 기록이 없습니다.</p>';
                }
            }
            
            html += `</div>`;
            return html;
        }
        
        // 팀별 경기 기록 카드 렌더링
        function renderTeamRecordCard(r, isTeam) {
            let html = '';
            const rankBadge = r.finalRank ? 
                (r.finalRank <= 3 ? ['🥇', '🥈', '🥉'][r.finalRank - 1] : `#${r.finalRank}`) : 
                (r.tempRank ? `#${r.tempRank}` : '');
            
            const borderColor = (r.finalRank && r.finalRank <= 3) ? 'gold' : 'var(--primary)';
            
            html += `<div class="viewer-record-item" data-name="${r.name}" style="padding:12px; margin:8px 0; background:var(--bg-secondary); border-radius:8px; border-left:3px solid ${borderColor};">`;
            html += `<div style="display:flex; justify-content:space-between; align-items:center;">`;
            html += `<strong>${rankBadge} ${r.name}</strong>`;
            html += `<span style="font-size:12px; color:var(--text-secondary);">${r.group || ''} ${r.groupRank ? r.groupRank + '위' : ''}</span>`;
            html += `</div>`;
            
            // 전적 요약
            html += `<div style="font-size:13px; margin-top:6px;">`;
            html += `전적: <strong>${r.wins || r.totalWins || 0}승 ${r.losses || r.totalLosses || 0}패</strong>`;
            if (!isTeam && (r.setWins !== undefined)) {
                html += ` | 세트: +${r.setWins}/-${r.setLosses}`;
            }
            const pf = r.pointsFor || 0;
            const pa = r.pointsAgainst || 0;
            const diff = pf - pa;
            const diffStr = diff > 0 ? `+${diff}` : diff;
            html += ` | 득실: ${pf}:${pa} (<span style="color:${diff > 0 ? 'green' : diff < 0 ? 'red' : 'black'};">${diffStr}</span>)`;
            html += `</div>`;
            
            // 경기 기록
            const matches = r.matches || [];
            if (matches.length > 0) {
                html += `<details style="margin-top:8px;"><summary style="cursor:pointer; font-size:12px; padding:4px 8px; background:#e8f5e9; border-radius:4px;">경기 기록 (${matches.length}경기)</summary>`;
                html += `<div style="margin-top:8px;">`;
                matches.forEach(m => {
                    const color = m.result === '승' ? '#2e7d32' : '#c62828';
                    const bg = m.result === '승' ? '#e8f5e9' : '#ffebee';
                    html += `<div style="padding:8px; margin:4px 0; background:${bg}; border-radius:6px; border-left:3px solid ${color};">`;
                    html += `<div style="display:flex; justify-content:space-between; align-items:center;">`;
                    html += `<strong style="color:${color};">${m.result}</strong>`;
                    html += `<span style="font-size:11px; color:var(--text-secondary);">${m.stage || ''}${m.group ? ' ' + m.group : ''}</span>`;
                    html += `</div>`;
                    html += `<div style="margin-top:4px;">vs ${m.opponent}</div>`;
                    html += `<div style="font-size:14px; font-weight:bold; margin-top:4px;">${m.score}</div>`;
                    if (m.setScores?.length > 0) {
                        html += `<div style="font-size:11px; margin-top:4px; color:var(--text-secondary);">`;
                        html += `세트별: ${m.setScores.map((s, i) => '<span style="background:#fff; padding:2px 6px; border-radius:3px; margin:2px;">' + (i+1) + '세트 ' + s.s1 + '-' + s.s2 + '</span>').join(' ')}`;
                        html += `</div>`;
                    }
                    
                    // 득점 히스토리가 있으면 표시
                    if (m.history && m.history.length > 0) {
                        html += `<details style="margin-top:6px;"><summary style="cursor:pointer; font-size:11px; color:var(--primary);">상세 득점 기록 (${m.history.length}개)</summary>`;
                        html += `<div style="margin-top:6px; max-height:150px; overflow-y:auto; background:white; padding:6px; border-radius:4px;">`;
                        m.history.slice().reverse().forEach(h => {
                            const pColor = h.player === r.name ? '#1976d2' : '#c62828';
                            const pBg = h.player === r.name ? '#e3f2fd' : '#ffebee';
                            html += `<div style="padding:3px 6px; margin:2px 0; background:${pBg}; border-radius:3px; font-size:10px; border-left:2px solid ${pColor};">`;
                            html += `<span style="font-weight:bold;">${h.player}</span> `;
                            html += `${h.scoreBefore} → ${h.scoreAfter}`;
                            if (h.type === 'goal') html += ` (골 ${h.points}점)`;
                            else if (h.type) html += ` (${h.type})`;
                            html += `</div>`;
                        });
                        html += `</div></details>`;
                    }
                    
                    html += `</div>`;
                });
                html += `</div></details>`;
            }
            html += `</div>`;
            
            return html;
        }
        
        // 그룹 경기 데이터에서 팀별 기록 계산
        function calculateTeamRecordsFromGroups(p) {
            const records = {};
            
            // 모든 팀 초기화
            p.teams?.forEach(team => {
                records[team.name] = {
                    name: team.name,
                    group: team.group ? team.group + '조' : '',
                    wins: 0,
                    losses: 0,
                    pointsFor: 0,
                    pointsAgainst: 0,
                    matches: []
                };
            });
            
            // 조별 경기에서 기록 수집
            p.groups?.forEach((group, gi) => {
                const groupName = group.name || (String.fromCharCode(65 + gi) + '조');
                
                group.matches?.forEach(match => {
                    if (match.status !== 'finished') return;
                    
                    const p1 = match.player1Name || match.player1;
                    const p2 = match.player2Name || match.player2;
                    const s1 = match.finalScore?.player1 || match.result?.score1 || 0;
                    const s2 = match.finalScore?.player2 || match.result?.score2 || 0;
                    const history = match.history || [];
                    const setScores = match.setScores || [];
                    
                    // 레코드가 없으면 생성
                    if (!records[p1]) records[p1] = { name: p1, group: groupName, wins: 0, losses: 0, pointsFor: 0, pointsAgainst: 0, matches: [] };
                    if (!records[p2]) records[p2] = { name: p2, group: groupName, wins: 0, losses: 0, pointsFor: 0, pointsAgainst: 0, matches: [] };
                    
                    // 승패 기록 (history, setScores 포함)
                    if (s1 > s2) {
                        records[p1].wins++;
                        records[p2].losses++;
                        records[p1].matches.push({ opponent: p2, result: '승', score: `${s1} - ${s2}`, stage: '조별', group: groupName, history: history, setScores: setScores });
                        records[p2].matches.push({ opponent: p1, result: '패', score: `${s2} - ${s1}`, stage: '조별', group: groupName, history: history, setScores: setScores });
                    } else {
                        records[p2].wins++;
                        records[p1].losses++;
                        records[p2].matches.push({ opponent: p1, result: '승', score: `${s2} - ${s1}`, stage: '조별', group: groupName, history: history, setScores: setScores });
                        records[p1].matches.push({ opponent: p2, result: '패', score: `${s1} - ${s2}`, stage: '조별', group: groupName, history: history, setScores: setScores });
                    }
                    
                    // 득실점
                    records[p1].pointsFor += s1;
                    records[p1].pointsAgainst += s2;
                    records[p2].pointsFor += s2;
                    records[p2].pointsAgainst += s1;
                });
            });
            
            // 결선 토너먼트 경기
            p.bracket?.rounds?.forEach(round => {
                round.matches?.forEach(match => {
                    if (match.status !== 'finished') return;
                    
                    const p1 = match.player1Name || match.player1?.name;
                    const p2 = match.player2Name || match.player2?.name;
                    const s1 = match.finalScore?.player1 || 0;
                    const s2 = match.finalScore?.player2 || 0;
                    const roundName = round.name || '결선';
                    const history = match.history || [];
                    const setScores = match.setScores || [];
                    
                    if (!p1 || !p2) return;
                    
                    if (!records[p1]) records[p1] = { name: p1, group: '', wins: 0, losses: 0, pointsFor: 0, pointsAgainst: 0, matches: [] };
                    if (!records[p2]) records[p2] = { name: p2, group: '', wins: 0, losses: 0, pointsFor: 0, pointsAgainst: 0, matches: [] };
                    
                    if (s1 > s2) {
                        records[p1].wins++;
                        records[p2].losses++;
                        records[p1].matches.push({ opponent: p2, result: '승', score: `${s1} - ${s2}`, stage: roundName, history: history, setScores: setScores });
                        records[p2].matches.push({ opponent: p1, result: '패', score: `${s2} - ${s1}`, stage: roundName, history: history, setScores: setScores });
                    } else {
                        records[p2].wins++;
                        records[p1].losses++;
                        records[p2].matches.push({ opponent: p1, result: '승', score: `${s2} - ${s1}`, stage: roundName, history: history, setScores: setScores });
                        records[p1].matches.push({ opponent: p2, result: '패', score: `${s1} - ${s2}`, stage: roundName, history: history, setScores: setScores });
                    }
                    
                    records[p1].pointsFor += s1;
                    records[p1].pointsAgainst += s2;
                    records[p2].pointsFor += s2;
                    records[p2].pointsAgainst += s1;
                });
            });
            
            return records;
        }
        
        function filterViewerRecords() {
            const search = document.getElementById('viewer-search')?.value.toLowerCase() || '';
            document.querySelectorAll('.viewer-record-item').forEach(item => {
                const name = item.dataset.name?.toLowerCase() || '';
                item.style.display = name.includes(search) ? 'block' : 'none';
            });
        }
        
        function openRefereeProject(index) {
            currentProject = projects[index];
            userRole = 'referee';
            goTo('project-detail');
        }
        // ========== 토너먼트 진행 함수 ==========
        function processTournamentProgression(match, winner) {
            if (!currentProject) return;
            
            const p = currentProject;
            
            // 1. 토너먼트 경기인 경우 다음 라운드 처리
            if (match.bracketRound) {
                advanceTournamentWinner(p, match, winner);
            }
            
            // 2. 조별 리그 경기인 경우 조별 리그 완료 여부 체크
            if (match.groupIndex !== undefined && p.tournamentType === 'group-knockout') {
                checkGroupStageCompletion(p);
            }
        }
        
        function advanceTournamentWinner(project, match, winner) {
            const currentRound = match.bracketRound;
            const matchNum = match.bracketMatchNum;
            
            // 패자 확인
            const loser = match.player1Name === winner ? match.player2Name : match.player1Name;
            
            // 현재 라운드 경기 수 확인
            const sameRoundMatches = project.matches.filter(m => 
                m.bracketRound === currentRound && !m.isLoserBracket
            );
            
            // 결승전(1경기만 있는 라운드)이면 대회 종료
            if (sameRoundMatches.length === 1 && !match.isLoserBracket) {
                project.tournamentWinner = winner;
                project.status = 'completed';
                saveProjects();
                announce(`🏆 우승: ${winner}!`);
                return;
            }
            
            // 패자전 경기인 경우 패자전 진출 처리
            if (match.isLoserBracket) {
                advanceLoserBracketWinner(project, match, winner, loser);
                saveProjects();
                return;
            }
            
            // 4강(2경기 라운드)이면 패자를 3/4위전에 배정
            if (sameRoundMatches.length === 2) {
                assignThirdPlaceMatch(project, match, loser);
            }
            
            // 패자전 진행 시 - 8강 이상 패자를 패자전에 배정
            if (project.loserBracket && sameRoundMatches.length >= 4) {
                assignLoserBracket(project, match, loser, sameRoundMatches.length);
            }
            
            // 커스텀 nextRounds 설정 확인
            const nextRoundsConfig = project.nextRounds || [];
            
            // 현재 라운드에 해당하는 다음 라운드 설정 찾기
            // currentRound가 1이면 nextRounds[0] (8강→4강 등)
            const roundConfigIndex = currentRound - 1;
            const nextRoundConfig = nextRoundsConfig[roundConfigIndex];
            
            let nextMatchNum = null;
            let isPlayer1 = true;
            
            if (nextRoundConfig && nextRoundConfig.matches) {
                // 커스텀 설정에서 현재 경기 승자가 어디로 가는지 찾기
                nextRoundConfig.matches.forEach((m, idx) => {
                    if (m.p1Match === matchNum) {
                        nextMatchNum = idx + 1;
                        isPlayer1 = true;
                    } else if (m.p2Match === matchNum) {
                        nextMatchNum = idx + 1;
                        isPlayer1 = false;
                    }
                });
                
                if (nextMatchNum) {
                    console.log(`🏆 커스텀 진출: 경기${matchNum} 승자(${winner}) → ${nextRoundConfig.name} 경기${nextMatchNum} (${isPlayer1 ? 'P1' : 'P2'})`);
                }
            }
            
            // 커스텀 설정이 없으면 기본 로직 (1vs2 → 다음1, 3vs4 → 다음2)
            if (nextMatchNum === null) {
                nextMatchNum = Math.ceil(matchNum / 2);
                isPlayer1 = (matchNum % 2 === 1);
                console.log(`🏆 기본 진출: 경기${matchNum} 승자(${winner}) → 다음 경기${nextMatchNum} (${isPlayer1 ? 'P1' : 'P2'})`);
            }
            
            const nextRound = currentRound + 1;
            
            // 다음 라운드 경기 찾기
            let nextMatch = project.matches.find(m => 
                m.bracketRound === nextRound && m.bracketMatchNum === nextMatchNum && !m.isLoserBracket
            );
            
            // 다음 라운드 경기가 없으면 생성
            if (!nextMatch) {
                const isTeam = project.competitionType === 'team';
                const sets = project.finalsSets || (isTeam ? 1 : 3);
                const winScore = isTeam ? 31 : 11;
                
                nextMatch = {
                    id: Date.now() + nextRound * 100 + nextMatchNum + Math.floor(Math.random() * 100),
                    player1Name: isPlayer1 ? winner : 'TBD',
                    player2Name: isPlayer1 ? 'TBD' : winner,
                    type: project.competitionType,
                    sets: sets,
                    winScore: winScore,
                    currentSet: 1,
                    setScores: [{ player1: 0, player2: 0 }],
                    currentServe: null,
                    serveCount: 0,
                    serveSelected: false,
                    timeouts: { player1: 1, player2: 1 },
                    history: [],
                    status: 'pending',
                    bracketRound: nextRound,
                    bracketMatchNum: nextMatchNum,
                    roundName: nextRoundConfig?.name || null,
                    refereePin: generatePin()
                };
                project.matches.push(nextMatch);
            } else {
                // 기존 다음 라운드 경기에 승자 배정
                if (isPlayer1) {
                    nextMatch.player1Name = winner;
                } else {
                    nextMatch.player2Name = winner;
                }
                
                // 두 선수 모두 결정되면 경기 준비 완료
                if (nextMatch.player1Name !== 'TBD' && nextMatch.player2Name !== 'TBD') {
                    nextMatch.status = 'ready';
                    console.log(`🏆 다음 경기 준비 완료: ${nextMatch.player1Name} vs ${nextMatch.player2Name}`);
                }
            }
            
            saveProjects();
        }
        
        // 패자전 배정 (8강 패자 → 5-8위전, 16강 패자 → 9-16위전)
        function assignLoserBracket(project, match, loser, roundMatchCount) {
            const isTeam = project.competitionType === 'team';
            const winScore = isTeam ? 31 : 11;
            const matchNum = match.bracketMatchNum;
            
            // 라운드별 순위 결정전 이름
            // 8강(4경기) → 5-8위전, 16강(8경기) → 9-16위전
            const startRank = roundMatchCount + 1;
            const endRank = roundMatchCount * 2;
            const loserRoundName = `${startRank}-${endRank}위전`;
            
            // 패자전 경기 번호: 1vs2→1, 3vs4→2 (기본)
            const loserMatchNum = Math.ceil(matchNum / 2);
            const isPlayer1 = (matchNum % 2 === 1);
            
            // 해당 패자전 경기 찾기
            let loserMatch = project.matches.find(m => 
                m.isLoserBracket && 
                m.loserRoundName === loserRoundName && 
                m.loserMatchNum === loserMatchNum
            );
            
            if (!loserMatch) {
                // 패자전 경기 생성
                loserMatch = {
                    id: Date.now() + 8000 + loserMatchNum + Math.floor(Math.random() * 100),
                    player1Name: isPlayer1 ? loser : 'TBD',
                    player2Name: isPlayer1 ? 'TBD' : loser,
                    type: project.competitionType,
                    sets: 3, // 패자전은 3세트
                    winScore: winScore,
                    currentSet: 1,
                    setScores: [{ player1: 0, player2: 0 }],
                    currentServe: null,
                    serveCount: 0,
                    serveSelected: false,
                    timeouts: { player1: 1, player2: 1 },
                    history: [],
                    status: 'pending',
                    isLoserBracket: true,
                    loserRoundName: loserRoundName,
                    loserMatchNum: loserMatchNum,
                    loserRoundSize: roundMatchCount, // 원래 라운드 경기 수 (4=8강, 8=16강)
                    roundName: loserRoundName,
                    refereePin: generatePin()
                };
                project.matches.push(loserMatch);
                console.log(`📉 패자전 생성: ${loser} → ${loserRoundName} 경기${loserMatchNum}`);
            } else {
                // 기존 패자전 경기에 배정
                if (isPlayer1) {
                    loserMatch.player1Name = loser;
                } else {
                    loserMatch.player2Name = loser;
                }
                
                if (loserMatch.player1Name !== 'TBD' && loserMatch.player2Name !== 'TBD') {
                    loserMatch.status = 'ready';
                    console.log(`📉 ${loserRoundName} 경기${loserMatchNum} 준비 완료: ${loserMatch.player1Name} vs ${loserMatch.player2Name}`);
                }
            }
        }
        
        // 패자전 승자 진출 처리
        function advanceLoserBracketWinner(project, match, winner, loser) {
            const loserRoundSize = match.loserRoundSize;
            const matchNum = match.loserMatchNum;
            const isTeam = project.competitionType === 'team';
            const winScore = isTeam ? 31 : 11;
            
            // 다음 패자전 라운드 결정
            // 5-8위전(2경기) 승자 → 5/6위전, 패자 → 7/8위전
            const nextLoserMatchCount = loserRoundSize / 2;
            
            if (nextLoserMatchCount >= 1) {
                // 승자용 다음 라운드
                const startRank = loserRoundSize + 1;
                const midRank = startRank + nextLoserMatchCount - 1;
                const winnerRoundName = `${startRank}/${midRank + 1}위전`;
                
                // 패자용 다음 라운드
                const loserStartRank = midRank + 1;
                const loserEndRank = loserRoundSize * 2;
                const loserNextRoundName = `${loserStartRank}/${loserEndRank}위전`;
                
                // 승자 진출
                assignNextLoserMatch(project, winner, winnerRoundName, matchNum, true, winScore, isTeam);
                
                // 패자 진출 (마지막 라운드가 아닌 경우)
                if (nextLoserMatchCount >= 2) {
                    assignNextLoserMatch(project, loser, loserNextRoundName, matchNum, false, winScore, isTeam);
                }
            }
        }
        
        // 다음 패자전 경기 배정
        function assignNextLoserMatch(project, player, roundName, prevMatchNum, isWinner, winScore, isTeam) {
            const nextMatchNum = Math.ceil(prevMatchNum / 2);
            const isPlayer1 = (prevMatchNum % 2 === 1);
            
            let nextMatch = project.matches.find(m => 
                m.isLoserBracket && 
                m.roundName === roundName && 
                m.loserMatchNum === nextMatchNum
            );
            
            if (!nextMatch) {
                nextMatch = {
                    id: Date.now() + 9000 + nextMatchNum + Math.floor(Math.random() * 100),
                    player1Name: isPlayer1 ? player : 'TBD',
                    player2Name: isPlayer1 ? 'TBD' : player,
                    type: isTeam ? 'team' : 'individual',
                    sets: 3,
                    winScore: winScore,
                    currentSet: 1,
                    setScores: [{ player1: 0, player2: 0 }],
                    currentServe: null,
                    serveCount: 0,
                    serveSelected: false,
                    timeouts: { player1: 1, player2: 1 },
                    history: [],
                    status: 'pending',
                    isLoserBracket: true,
                    roundName: roundName,
                    loserMatchNum: nextMatchNum,
                    refereePin: generatePin()
                };
                project.matches.push(nextMatch);
                console.log(`📉 ${roundName} 생성: ${player}`);
            } else {
                if (isPlayer1) {
                    nextMatch.player1Name = player;
                } else {
                    nextMatch.player2Name = player;
                }
                
                if (nextMatch.player1Name !== 'TBD' && nextMatch.player2Name !== 'TBD') {
                    nextMatch.status = 'ready';
                    console.log(`📉 ${roundName} 준비 완료: ${nextMatch.player1Name} vs ${nextMatch.player2Name}`);
                }
            }
        }
        
        // 3/4위전 배정
        function assignThirdPlaceMatch(project, match, loser) {
            const isTeam = project.competitionType === 'team';
            const winScore = isTeam ? 31 : 11;
            
            // 3/4위전 경기 찾기
            let thirdPlaceMatch = project.matches.find(m => m.isThirdPlace === true);
            
            if (!thirdPlaceMatch) {
                // 3/4위전 경기 생성
                thirdPlaceMatch = {
                    id: Date.now() + 9999 + Math.floor(Math.random() * 100),
                    player1Name: loser,
                    player2Name: 'TBD',
                    type: project.competitionType,
                    sets: 3, // 3/4위전은 항상 3세트
                    winScore: winScore,
                    currentSet: 1,
                    setScores: [{ player1: 0, player2: 0 }],
                    currentServe: null,
                    serveCount: 0,
                    serveSelected: false,
                    timeouts: { player1: 1, player2: 1 },
                    history: [],
                    status: 'pending',
                    isThirdPlace: true, // 3/4위전 표시

        function checkGroupStageCompletion(project) {
            if (!project.groups || project.groups.length === 0) return;
            
            // 조별 리그 경기가 모두 완료되었는지 확인
            const groupMatches = project.matches.filter(m => m.groupIndex !== undefined);
            const completedGroupMatches = groupMatches.filter(m => m.status === 'completed');
            
            if (groupMatches.length === 0 || completedGroupMatches.length < groupMatches.length) {
                return; // 아직 조별 리그 진행 중
            }
            
            // 이미 본선 생성됨?
            const knockoutMatches = project.matches.filter(m => m.bracketRound);
            if (knockoutMatches.length > 0) return;
            
            // 조별 순위 계산 및 본선 진출자 결정
            const advanceCount = project.groupSettings?.advanceCount || 2;
            const knockoutSize = project.knockoutSettings?.size || 8;
            
            const advancers = [];
            
            project.groups.forEach((group, gIdx) => {
                const standings = calculateGroupStandings(project, gIdx);
                const groupAdvancers = standings.slice(0, advanceCount);
                advancers.push(...groupAdvancers.map((s, rank) => ({
                    name: s.name,
                    group: group.name,
                    rank: rank + 1,
                    seed: gIdx * advanceCount + rank + 1
                })));
            });
            
            // 본선 대진표 생성 (시드 배정)
            generateKnockoutBracket(project, advancers, knockoutSize);
            
            announce(`조별 리그 완료! 본선 ${knockoutSize}강 대진표 생성`);
        }
        
        function calculateGroupStandings(project, groupIndex) {
            const group = project.groups[groupIndex];
            if (!group) return [];
            
            const records = {};
            group.members.forEach(m => {
                records[m] = { name: m, wins: 0, losses: 0, setsWon: 0, setsLost: 0, pointsFor: 0, pointsAgainst: 0 };
            });
            
            const groupMatches = project.matches.filter(m => 
                m.groupIndex === groupIndex && m.status === 'completed'
            );
            
            groupMatches.forEach(m => {
                const p1 = m.player1Name;
                const p2 = m.player2Name;
                
                if (!records[p1] || !records[p2]) return;
                
                let p1Sets = 0, p2Sets = 0;
                m.setScores.forEach(s => {
                    if (s.player1 > s.player2) p1Sets++;
                    else if (s.player2 > s.player1) p2Sets++;
                    
                    records[p1].pointsFor += s.player1;
                    records[p1].pointsAgainst += s.player2;
                    records[p2].pointsFor += s.player2;
                    records[p2].pointsAgainst += s.player1;
                });
                
                records[p1].setsWon += p1Sets;
                records[p1].setsLost += p2Sets;
                records[p2].setsWon += p2Sets;
                records[p2].setsLost += p1Sets;
                
                if (p1Sets > p2Sets) {
                    records[p1].wins++;
                    records[p2].losses++;
                } else {
                    records[p2].wins++;
                    records[p1].losses++;
                }
            });
            
            // 정렬: 승수 > 세트득실 > 점수득실
            return Object.values(records).sort((a, b) => {
                if (b.wins !== a.wins) return b.wins - a.wins;
                const aSetDiff = a.setsWon - a.setsLost;
                const bSetDiff = b.setsWon - b.setsLost;
                if (bSetDiff !== aSetDiff) return bSetDiff - aSetDiff;
                const aPointDiff = a.pointsFor - a.pointsAgainst;
                const bPointDiff = b.pointsFor - b.pointsAgainst;
                return bPointDiff - aPointDiff;
            });
        }
        
        function generateKnockoutBracket(project, advancers, size) {
            // 시드 배정 (1번 시드 vs 마지막 시드가 결승에서 만나도록)
            const seededOrder = [];
            
            // 기본 시드 배치 (8강 예시: 1-8, 4-5, 2-7, 3-6)
            function getSeedOrder(n) {
                if (n === 2) return [1, 2];
                const half = getSeedOrder(n / 2);
                const result = [];
                half.forEach(seed => {
                    result.push(seed);
                    result.push(n + 1 - seed);
                });
                return result;
            }
            
            const seedOrder = getSeedOrder(size);
            
            // 대진 생성
            for (let i = 0; i < size; i += 2) {
                const seed1 = seedOrder[i];
                const seed2 = seedOrder[i + 1];
                
                const p1 = advancers.find(a => a.seed === seed1);
                const p2 = advancers.find(a => a.seed === seed2);
                
                const match = {
                    id: Date.now() + i,
                    player1Name: p1 ? p1.name : 'BYE',
                    player2Name: p2 ? p2.name : 'BYE',
                    type: project.competitionType,
                    sets: project.competitionType === 'individual' ? 3 : 1,
                    winScore: project.competitionType === 'individual' ? 11 : 31,
                    currentSet: 1,
                    setScores: [{ player1: 0, player2: 0 }],
                    currentServe: 'player1',
                    serveCount: 0,
                    serveSelected: false,
                    timeouts: { player1: 1, player2: 1 },
                    history: [],
                    status: 'pending',
                    bracketRound: 1,
                    bracketMatchNum: (i / 2) + 1,
                    refereePin: generatePin()
                };
                
                // BYE 처리 - 상대가 자동 진출
                if (p1 && !p2) {
                    match.status = 'completed';
                    match.winner = p1.name;
                    match.setScores = [{ player1: 0, player2: 0 }];
                    match.isBye = true;
                } else if (p2 && !p1) {
                    match.status = 'completed';
                    match.winner = p2.name;
                    match.setScores = [{ player1: 0, player2: 0 }];
                    match.isBye = true;
                }
                
                project.matches.push(match);
                
                // BYE 승자는 바로 다음 라운드로 진출
                if (match.isBye && match.winner) {
                    advanceTournamentWinner(project, match, match.winner);
                }
            }
        }

        function generateDefaultFinals(project, groupStandings, advanceCount, sets, finalsSize) {
            const isTeam = project.competitionType === 'team';
            const winScore = isTeam ? 31 : 11;
            const groupNames = Object.keys(groupStandings).sort();
            const roundName = getRoundNameBySize(finalsSize);
            
            // 진출자 목록 생성
            const advancers = [];
            groupNames.forEach(groupName => {
                const standings = groupStandings[groupName];
                for (let rank = 0; rank < advanceCount && rank < standings.length; rank++) {
                    advancers.push({
                        name: standings[rank].name,
                        group: groupName,
                        rank: rank + 1
                    });
                }
            });
            
            console.log('🏆 기본 본선 대진표 생성:', advancers.length + '명 진출,', roundName);
            
            // 크로스 대진 생성 (A1 vs B2, A2 vs B1, C1 vs D2, C2 vs D1...)
            let matchNum = 0;
            for (let i = 0; i < advancers.length; i += 4) {
                // 4명씩 묶어서 크로스 대진
                const a1 = advancers[i];     // A조 1위
                const a2 = advancers[i + 1]; // A조 2위
                const b1 = advancers[i + 2]; // B조 1위
                const b2 = advancers[i + 3]; // B조 2위

                    matchNum++;

            p.groups.forEach(g => allMembers.push(...g.members));
            
            // 섞기
            for (let i = allMembers.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [allMembers[i], allMembers[j]] = [allMembers[j], allMembers[i]];
            }
            
            // 다시 배정
            const groupCount = p.groups.length;
            p.groups.forEach((g, idx) => {
                g.members = [];
                g.matches = [];
            });
            
            allMembers.forEach((member, idx) => {
                const round = Math.floor(idx / groupCount);
                const groupIdx = round % 2 === 0 ? idx % groupCount : groupCount - 1 - (idx % groupCount);
                p.groups[groupIdx].members.push(member);
            });
            
            // 경기 재생성
            p.matches = [];
            p.groups.forEach((group, gIdx) => {
                const members = group.members;
                for (let i = 0; i < members.length; i++) {
                    for (let j = i + 1; j < members.length; j++) {
                        const match = {
                            id: Date.now() + gIdx * 1000 + i * 100 + j,
                            player1Name: members[i],
                            player2Name: members[j],
                            type: p.competitionType,
                            sets: p.competitionType === 'individual' ? 3 : 1,
                            winScore: p.competitionType === 'individual' ? 11 : 31,
                            currentSet: 1,
                            setScores: [{ player1: 0, player2: 0 }],
                            currentServe: 'player1',
                            serveCount: 0,
                            serveSelected: false,
                            timeouts: { player1: 1, player2: 1 },
                            history: [],
                            status: 'pending',
                            groupIndex: gIdx,
                            groupName: group.name,
                            refereePin: generatePin()
                        };
                        p.matches.push(match);
                        group.matches.push(match.id);
                    }
                }
            });
            
            saveProjects();
            announce('조가 다시 편성되었습니다');
            render();
        }

        // 경기 스케줄 업데이트 (날짜, 시간, 소요시간)
        function updateMatchSchedule(matchIdx, field, value) {
            if (!currentProject || !currentProject.matches[matchIdx]) return;
            
            const match = currentProject.matches[matchIdx];
            
            switch(field) {
                case 'date':
                    match.scheduledDate = value;
                    announce(`경기 날짜 설정: ${value}`);
                    break;
                case 'time':
                    match.scheduledTime = value;
                    announce(`경기 시간 설정: ${value}`);
                    break;
                case 'duration':
                    match.estimatedDuration = parseInt(value);

                    break;
            }
            
            saveProjects();

        // 다음 경기에 연속 스케줄 배정
        function copyScheduleToNext(matchIdx) {
            if (!currentProject || !currentProject.matches[matchIdx]) return;
            
            const currentMatch = currentProject.matches[matchIdx];
            const nextMatch = currentProject.matches[matchIdx + 1];
            
            if (!nextMatch) {
                alert('다음 경기가 없습니다.');
                return;
            }
            
            if (!currentMatch.scheduledDate || !currentMatch.scheduledTime) {
                alert('현재 경기의 날짜와 시간을 먼저 설정해주세요.');
                return;
            }
            
            // 현재 경기 시간 + 소요시간으로 다음 경기 시간 계산
            const currentDateTime = new Date(`${currentMatch.scheduledDate}T${currentMatch.scheduledTime}`);
            const nextDateTime = new Date(currentDateTime.getTime() + (currentMatch.estimatedDuration * 60000));
            
            // 다음 경기에 설정
            nextMatch.scheduledDate = nextDateTime.toISOString().split('T')[0];
            nextMatch.scheduledTime = nextDateTime.toTimeString().slice(0, 5);
            nextMatch.courtName = currentMatch.courtName; // 경기장도 복사
            nextMatch.estimatedDuration = currentMatch.estimatedDuration; // 소요시간도 복사
            
            saveProjects();
            announce(`다음 경기에 연속 스케줄 배정됨: ${nextMatch.scheduledDate} ${nextMatch.scheduledTime}`);
            render();
        }

            if (!currentProject || !currentProject.matches.length) return;
            
            const startDate = prompt('시작 날짜를 입력하세요 (YYYY-MM-DD):', new Date().toISOString().split('T')[0]);
            if (!startDate) return;
            
            const startTime = prompt('시작 시간을 입력하세요 (HH:MM):', '09:00');
            if (!startTime) return;
            
            const intervalMinutes = parseInt(prompt('경기 간격을 입력하세요 (분):', '45'));
            if (isNaN(intervalMinutes)) return;
            
            let currentDateTime = new Date(`${startDate}T${startTime}`);
            
            currentProject.matches.forEach((match, idx) => {
                match.scheduledDate = currentDateTime.toISOString().split('T')[0];
                match.scheduledTime = currentDateTime.toTimeString().slice(0, 5);
                match.estimatedDuration = intervalMinutes - 15; // 15분 여유시간
                match.matchOrder = idx + 1;
                
                // 다음 경기 시간 계산
                currentDateTime = new Date(currentDateTime.getTime() + (intervalMinutes * 60000));
            });
            
            saveProjects();
            announce(`전체 스케줄이 생성되었습니다 (${currentProject.matches.length}경기)`);

        // 심판 스케줄 검색

            const refereeName = document.getElementById('referee-name-search')?.value.trim();
            if (!refereeName) {
                alert('심판 이름을 입력하세요.');

            }
            
            // 이름 저장 옵션 확인
            const saveCheckbox = document.getElementById('save-referee-name');
            if (saveCheckbox?.checked) {
                localStorage.setItem('myRefereeName', refereeName);

                localStorage.removeItem('myRefereeName');

            const resultsDiv = document.getElementById('referee-schedule-results');
            if (!resultsDiv) return;
            
            // 모든 프로젝트에서 해당 심판의 경기 찾기
            const refereeMatches = [];
            projects.forEach(project => {
                if (!project.matches) return;
                
                project.matches.forEach(match => {
                    if (match.mainRefereeName?.includes(refereeName)) {
                        refereeMatches.push({
                            ...match,
                            projectName: project.name,
                            projectDate: project.date,
                            projectId: project.id
                        });
                    }
                });
            });
            
            if (refereeMatches.length === 0) {
                resultsDiv.innerHTML = `
                    <div style="background:#fff3e0; padding:16px; border-radius:8px; margin-top:16px; border-left:4px solid #ff9800;">

                `;
                return;
            }
            
            // 날짜와 시간 기준으로 정렬
            refereeMatches.sort((a, b) => {
                if (a.scheduledDate && b.scheduledDate) {
                    const aDateTime = new Date(`${a.scheduledDate}T${a.scheduledTime || '00:00'}`);
                    const bDateTime = new Date(`${b.scheduledDate}T${b.scheduledTime || '00:00'}`);
                    return aDateTime - bDateTime;
                }
                return a.projectName.localeCompare(b.projectName);
            });
            
            // 통계 계산
            const today = new Date().toISOString().split('T')[0];
            const completedCount = refereeMatches.filter(m => m.status === 'completed').length;
            const todayMatches = refereeMatches.filter(m => m.scheduledDate === today);
            const pendingCount = refereeMatches.filter(m => m.status !== 'completed').length;
            
            const matchesHTML = refereeMatches.map(match => {
                const scheduledInfo = match.scheduledDate && match.scheduledTime ? 
                    `🕐 ${match.scheduledDate} ${match.scheduledTime}` :

                const endTime = match.scheduledDate && match.scheduledTime ? 
                    (() => {
                        const end = new Date(`${match.scheduledDate}T${match.scheduledTime}`);
                        end.setMinutes(end.getMinutes() + (match.estimatedDuration || 30));
                        return ` ~ ${end.toTimeString().slice(0, 5)}`;
                    })() : '';
                
                const statusInfo = match.status === 'completed' ? '✅ 완료' :

                                 '⭕ 대기';

                return `

                        ${isToday ? '<div style="background:#fff3e0; color:#e65100; padding:4px 8px; border-radius:4px; font-size:12px; font-weight:600; margin-bottom:8px; display:inline-block;">📌 오늘 경기</div>' : ''}

                        <div style="background:#f8f9fa; padding:12px; border-radius:6px; font-size:14px;">
                            <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
                                <div>${scheduledInfo}${endTime}</div>
                                <div><strong>📊 상태:</strong> ${statusInfo}</div>
                                <div><strong>🏟️ 경기장:</strong> ${match.courtName || '미정'}</div>
                                <div><strong>🔑 PIN:</strong> <span style="font-family:monospace; background:#e3f2fd; padding:2px 6px; border-radius:4px;">${match.refereePin || '미설정'}</span></div>
                            </div>

            // 다음 심판 경기 찾기

                        </div>
                        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; font-size:14px;">
                            <div>
                                <div style="opacity:0.8;">📅 일정</div>
                                <div style="font-weight:600;">${timeInfo}</div>
                            </div>

                                <div style="opacity:0.8;">🏟️ 경기장</div>

                        <div style="margin-top:12px; padding-top:12px; border-top:1px solid rgba(255,255,255,0.3); display:flex; justify-content:space-between; align-items:center;">
                            <div>
                                <span style="opacity:0.8;">🔑 PIN:</span> 
                                <span style="font-family:monospace; background:rgba(255,255,255,0.2); padding:4px 8px; border-radius:4px; font-size:16px;">${nextMatch.refereePin || '미설정'}</span>
                            </div>
                            <div style="font-size:12px; opacity:0.8;">${nextMatch.projectName}</div>
                        </div>
                    </div>
                `;
            }
            
            resultsDiv.innerHTML = `
                <div style="margin-top:20px;">
                    <!-- 통계 요약 -->
                    <div style="display:grid; grid-template-columns:repeat(3, 1fr); gap:12px; margin-bottom:16px;">
                        <div style="background:#e8f5e9; padding:12px; border-radius:8px; text-align:center;">
                            <div style="font-size:24px; font-weight:700; color:#2e7d32;">${completedCount}</div>
                            <div style="font-size:12px; color:#666;">완료</div>
                        </div>
                        <div style="background:#fff3e0; padding:12px; border-radius:8px; text-align:center;">
                            <div style="font-size:24px; font-weight:700; color:#e65100;">${todayMatches.length}</div>
                            <div style="font-size:12px; color:#666;">오늘</div>
                        </div>
                        <div style="background:#e3f2fd; padding:12px; border-radius:8px; text-align:center;">
                            <div style="font-size:24px; font-weight:700; color:#1565c0;">${pendingCount}</div>
                            <div style="font-size:12px; color:#666;">남은 경기</div>
                        </div>
                    </div>
                    
                    ${nextMatchHTML}
                    
                    <h3 style="margin-bottom:12px;">📋 전체 배정 경기 (${refereeMatches.length}경기)</h3>
                    <div style="max-height:400px; overflow-y:auto;">

        // 경기 기록 순서 토글

        // 빠른 프로젝트 - 세트 수 표시 토글
        function updateQPSets() {

        // 빠른 프로젝트 생성
        function createQuickProject() {
            const name = document.getElementById('qp-name').value.trim();
            if (!name) {
                alert('프로젝트 이름을 입력해주세요.');
                return;
            }
            
            const participantsText = document.getElementById('qp-participants').value.trim();
            if (!participantsText) {
                alert('참가자를 입력해주세요.');
                return;
            }
            
            // 참가자 파싱 (줄바꿈 또는 쉼표로 구분)
            const participants = participantsText
                .split(/[\n,]+/)
                .map(p => p.trim())
                .filter(p => p.length > 0);
            
            if (participants.length < 2) {
                alert('최소 2명 이상의 참가자가 필요합니다.');
                return;
            }
            
            const type = document.getElementById('qp-type').value;
            const sets = type === 'team' ? 1 : parseInt(document.getElementById('qp-sets').value);
            const format = document.getElementById('qp-format').value;
            const isTeam = type === 'team';
            const winScore = isTeam ? 31 : 11;
            
            // 프로젝트 생성
            const project = {
                id: Date.now(),
                name: name,
                date: new Date().toISOString().split('T')[0],
                location: '',
                competitionType: isTeam ? 'team' : 'individual',
                players: isTeam ? [] : participants,
                teams: isTeam ? participants.map(t => ({ name: t, players: [] })) : [],
                tournamentType: format === 'full-league' ? 'group-only' : 'knockout-only',
                groups: [],
                matches: [],
                preliminarySets: sets,
                finalsSets: sets,
                createdAt: new Date().toISOString(),
                isQuickProject: true
            };
            
            // 경기 생성
            if (format === 'full-league') {
                // 풀리그: 모든 조합
                for (let i = 0; i < participants.length; i++) {
                    for (let j = i + 1; j < participants.length; j++) {
                        const match = {
                            id: Date.now() + i * 100 + j,
                            player1Name: participants[i],
                            player2Name: participants[j],
                            type: isTeam ? 'team' : 'individual',
                            sets: sets,
                            winScore: winScore,
                            currentSet: 1,
                            setScores: [{ player1: 0, player2: 0 }],
                            currentServe: 'player1',
                            serveCount: 0,
                            serveSelected: false,
                            timeouts: { player1: 1, player2: 1 },
                            history: [],
                            status: 'pending',
                            refereePin: generatePin()
                        };
                        project.matches.push(match);
                    }
                }
            } else {
                // 토너먼트: 순서대로 매칭
                const shuffled = [...participants];
                // 랜덤 섞기
                for (let i = shuffled.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                }
                
                for (let i = 0; i < shuffled.length - 1; i += 2) {
                    const match = {
                        id: Date.now() + i,
                        player1Name: shuffled[i],
                        player2Name: shuffled[i + 1] || 'BYE',
                        type: isTeam ? 'team' : 'individual',
                        sets: sets,
                        winScore: winScore,
                        currentSet: 1,
                        setScores: [{ player1: 0, player2: 0 }],
                        currentServe: 'player1',
                        serveCount: 0,
                        serveSelected: false,
                        timeouts: { player1: 1, player2: 1 },
                        history: [],
                        status: 'pending',
                        bracketRound: 1,
                        bracketMatchNum: i / 2 + 1,
                        refereePin: generatePin()
                    };
                    project.matches.push(match);
                }
            }
            
            // 프로젝트 저장
            projects.push(project);
            saveProjects();
            
            // 생성된 프로젝트로 이동
            currentProject = project;
            announce(`${project.name} 프로젝트가 생성되었습니다. ${project.matches.length}경기`);
            goTo('project-list');
        }
        // 심판 연습 모드 경기 시작

            const practiceMatch = {

                player1Name: player1,
                player2Name: player2,

                currentServe: null,
                serveCount: 0,
                serveSelected: false,
                timeouts: { player1: 1, player2: 1 },

                warmupUsed: false,
                status: 'in-progress',
                isPractice: true,

            practiceProject.matches.push(practiceMatch);
            projects.push(practiceProject);
            
            // 현재 프로젝트/경기 설정 먼저 (Firebase 동기화 전에)

                });

            console.log('📊 초기 스코어:', currentMatch.setScores[0].player1, '-', currentMatch.setScores[0].player2);
            console.log('🎾 서브 선택:', currentMatch.serveSelected ? currentMatch.currentServe : '미선택');
            
            announce('연습 경기가 시작되었습니다. ' + player1 + ' 대 ' + player2 + '. ' + sets + '세트');

        function watchLiveMatch(matchId) {
            // 프로젝트에서 경기 찾기
            for (const project of projects) {
                const match = project.matches?.find(m => m.id === matchId);
                if (match) {
                    currentProject = project;
                    currentMatch = match;
                    isAuthenticated = false; // 관람 모드
                    userRole = 'viewer';
                    
                    // Firebase 실시간 리스너 설정
                    if (database && match.isShared) {
                        database.ref('liveMatches/' + matchId).on('value', (snapshot) => {
                            const liveData = snapshot.val();
                            if (liveData && currentMatch && currentMatch.id === matchId) {
                                // 실시간 데이터로 경기 상태 업데이트
                                Object.assign(currentMatch, liveData);
                                render();
                            }
                        });
                    }
                    
                    screen = 'match';
                    announce(`${match.player1Name} 대 ${match.player2Name} 경기 관람 시작`);
                    render();
                    return;
                }
            }
            alert('경기를 찾을 수 없습니다.');
        }
        
        // 연습 경기 개별 삭제
        function deletePracticeMatch(matchId) {
            if (!confirm('이 연습 경기 기록을 삭제하시겠습니까?')) return;
            
            // 프로젝트에서 경기 찾아서 삭제
            for (const project of projects) {
                if (project.isPractice && project.matches) {
                    const matchIndex = project.matches.findIndex(m => m.id === matchId);
                    if (matchIndex >= 0) {
                        project.matches.splice(matchIndex, 1);
                        
                        // 프로젝트에 경기가 없으면 프로젝트도 삭제
                        if (project.matches.length === 0) {
                            const projectIndex = projects.findIndex(p => p.id === project.id);
                            if (projectIndex >= 0) {
                                projects.splice(projectIndex, 1);
                            }
                        }
                        
                        saveProjects();
                        
                        // Firebase에서도 삭제
                        if (database) {
                            database.ref('liveMatches/' + matchId).remove();
                        }
                        
                        announce('연습 경기가 삭제되었습니다');
                        render();
                        return;
                    }
                }
            }
        }
        
        // 완료된 연습 경기 전체 삭제
        function deleteAllPracticeMatches() {
            const completedCount = projects
                .filter(p => p.isPractice && p.isShared)
                .flatMap(p => p.matches || [])
                .filter(m => m.status === 'completed' && m.isShared).length;
            
            if (completedCount === 0) {
                alert('삭제할 완료된 경기가 없습니다.');
                return;
            }
            
            if (!confirm(`완료된 연습 경기 ${completedCount}개를 모두 삭제하시겠습니까?\n\n이 작업은 되돌릴 수 없습니다.`)) return;
            
            // 완료된 연습 경기 삭제
            projects.forEach(project => {
                if (project.isPractice && project.matches) {
                    const completedMatches = project.matches.filter(m => m.status === 'completed' && m.isShared);
                    
                    // Firebase에서도 삭제
                    if (database) {
                        completedMatches.forEach(m => {
                            database.ref('liveMatches/' + m.id).remove();
                        });
                    }
                    
                    // 완료된 경기 제거
                    project.matches = project.matches.filter(m => !(m.status === 'completed' && m.isShared));
                }
            });
            
            // 경기가 없는 연습 프로젝트 제거
            projects = projects.filter(p => !p.isPractice || (p.matches && p.matches.length > 0));
            
            saveProjects();
            announce(`완료된 연습 경기 ${completedCount}개가 삭제되었습니다`);
            render();
        }
        
        // 실시간 경기 데이터 업데이트 (점수 변경 시 호출)
        function updateLiveMatch() {
            if (!currentMatch) return;
            
            // 로컬 저장 및 프로젝트 업데이트
            updateLiveMatchStatus(currentMatch);
            
            // Firebase 실시간 동기화 (공유된 경기만)
            if (currentMatch.isShared) {
                syncLiveMatchToFirebase(currentMatch);
            }
        }
        function savePracticeResult(silent = false) {
            if (!currentMatch) return;
            
            const practiceHistory = JSON.parse(localStorage.getItem('practiceHistory') || '[]');
            
            // 중복 저장 방지
            const exists = practiceHistory.some(m => m.id === currentMatch.id);
            if (exists) {
                if (!silent) alert('이미 저장된 기록입니다.');
                return;
            }
            
            // 저장할 데이터
            const matchRecord = {
                id: currentMatch.id,
                player1Name: currentMatch.player1Name,
                player2Name: currentMatch.player2Name,
                setScores: currentMatch.setScores,
                history: currentMatch.history,
                winner: currentMatch.winner,
                finishedAt: currentMatch.finishedAt || new Date().toISOString(),
                sets: currentMatch.sets,
                matchType: 'practice' // ✨ 구분 필드
            };
            
            // 로컬에 저장
            practiceHistory.push(matchRecord);
            localStorage.setItem('practiceHistory', JSON.stringify(practiceHistory));
            
            // ✨ Firebase에도 저장
            savePracticeToFirebase(matchRecord);
            
            if (!silent) {
                announce('기록이 저장되었습니다');
                alert('기록이 저장되었습니다!');
            }
        }
        
        // ✨ 연습 경기를 Firebase에 저장
        function savePracticeToFirebase(matchRecord) {
            if (!database || !userId) {
                // Firebase 미연결 - 오프라인 큐에 추가
                const queue = JSON.parse(localStorage.getItem('offlineQueue') || '[]');
                queue.push({
                    type: 'practiceMatch',
                    userId: userId,
                    data: matchRecord,
                    timestamp: Date.now()
                });
                localStorage.setItem('offlineQueue', JSON.stringify(queue));
                console.log('📴 연습 경기 오프라인 큐에 추가');
                return;
            }
            
            try {
                if (!isOffline) {
                    // Firebase에 저장
                    const matchId = 'practice_' + matchRecord.id;
                    database.ref(`practiceMatches/${userId}/${matchId}`).set(matchRecord);
                    console.log('Firebase에 연습 경기 저장:', matchId);
                } else {
                    // 오프라인 큐에 추가
                    const queue = JSON.parse(localStorage.getItem('offlineQueue') || '[]');
                    queue.push({
                        type: 'practiceMatch',
                        userId: userId,
                        matchId: 'practice_' + matchRecord.id,
                        data: matchRecord,
                        timestamp: Date.now()
                    });
                    localStorage.setItem('offlineQueue', JSON.stringify(queue));
                    console.log('📴 연습 경기 오프라인 큐에 추가');
                }
            } catch (error) {
                console.error('연습 경기 Firebase 저장 실패:', error);
            }
        }

        // 워밍업 시작 (IBSA 규칙: 개인전 60초, 팀전 90초)
        function startWarmup() {
            // 경기당 워밍업 1회만 사용 가능
            currentMatch.warmupUsed = true;
            saveProjects();
            
            warmupActive = true;
            // IBSA 규칙: 개인전 60초, 팀전 90초 (type 없으면 개인전으로 처리)
            const isTeam = currentMatch.type === 'team';
            warmupSeconds = isTeam ? 90 : 60;
            announce(`워밍업 ${warmupSeconds}초 시작`);
            render();
            
            warmupTimer = setInterval(() => {
                warmupSeconds--;
                const display = document.getElementById('warmup-timer');
                if (display) {
                    display.textContent = `${Math.floor(warmupSeconds / 60)}:${(warmupSeconds % 60).toString().padStart(2, '0')}`;
                }
                
                // 30초마다 자동 알림
                if (warmupSeconds > 0 && warmupSeconds % 30 === 0) {
                    announce(`${warmupSeconds}초 남았습니다`);
                }
                
                // 10초 남았을 때 알림
                if (warmupSeconds === 10) {
                    announce('10초');
                }
                
                if (warmupSeconds <= 0) {
                    stopWarmup();
                    announce('워밍업 종료');
                }
            }, 1000);
        }

        // ✨ Firebase 기반 사용자 설정
        // Firebase에서 사용자 설정 로드
        function loadUserPreferences() {
            if (!database || !userId) {
                // Firebase 미연결 - 로컬 스토리지에서 로드
                favoritePlayers = JSON.parse(localStorage.getItem('favorite-players') || '[]');
                notifiedMatches = JSON.parse(localStorage.getItem('notified-matches') || '[]');

        // Firebase에 사용자 설정 저장
        function saveUserPreferences() {
            if (!database || !userId) {
                // Firebase 미연결 - 로컬만 저장
                localStorage.setItem('favorite-players', JSON.stringify(favoritePlayers));
                localStorage.setItem('notified-matches', JSON.stringify(notifiedMatches));

            try {
                if (database && userId && !isOffline) {
                    database.ref(`userPreferences/${userId}`).set({

                        notifications: notifiedMatches,
                        lastUpdated: new Date().toISOString()
                    });

                    const queue = JSON.parse(localStorage.getItem('offlineQueue') || '[]');

                        type: 'userPreferences',
                        userId: userId,
                        data: { favorites: favoritePlayers, notifications: notifiedMatches },
                        timestamp: Date.now()
                    });
                    localStorage.setItem('offlineQueue', JSON.stringify(queue));

                    localStorage.setItem('favorite-players', JSON.stringify(favoritePlayers));

        // 검색 결과 렌더링 함수

                    (m.player2Name && m.player2Name.toLowerCase().includes(query));

        // ✨ 경기 결과 보기
        function viewMatchResult(type, idx) {
            if (type === 'actual') {
                currentProject = projects[idx];
                goTo('project-detail');
            } else {
                window.currentPracticeRecordIdx = idx;
                goTo('practice-detail');
            }
        }
        // 즐겨찾기 토글
        function toggleFavorite(player1, player2) {
            if (!player1 || !player2) return;
            [player1, player2].forEach(p => {
                if (p && p !== '선수1' && p !== '선수2') {
                    const idx = favoritePlayers.indexOf(p);
                    if (idx > -1) {
                        favoritePlayers.splice(idx, 1);
                    } else {
                        favoritePlayers.push(p);
                    }
                }
            });
            
            // ✨ Firebase 저장
            saveUserPreferences();
            
            renderViewerResults();
            announce(`${player1} 즐겨찾기 ${favoritePlayers.includes(player1) ? '추가' : '제거'}`);
        }
        
        // 알림 토글
        function toggleNotification(matchKey) {
            const idx = notifiedMatches.indexOf(matchKey);
            if (idx > -1) {
                notifiedMatches.splice(idx, 1);
            } else {
                notifiedMatches.push(matchKey);
            }
            
            // ✨ Firebase 저장
            saveUserPreferences();
            
            renderViewerResults();
            announce(`알림 ${idx > -1 ? '해제' : '설정'}`);
        }
        
        
        // 즐겨찾기만 보기
        function filterFavoritesOnly() {
            showFavoritesOnly = !showFavoritesOnly;
            renderViewerResults();
            announce(showFavoritesOnly ? '즐겨찾기만 표시' : '전체 표시');
        }
        
        // 연습 경기 시작
        function startPracticeMode() {
            goTo('practice-mode');
            announce('🏋️ 연습 경기 모드로 전환되었습니다');
        }
        

        function generatePin() {
            return Math.random().toString().slice(2, 6);
        }
        // 페이지 로드 시 초기 렌더링
        window.addEventListener("DOMContentLoaded", function() {
            console.log("✅ 쇼다운 심판 앱 로드됨");
            render();
        });
        
    </script>
</body>
</html>
