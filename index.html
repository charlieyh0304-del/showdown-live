                tournamentType: tournamentType,
                groups: [],
                matches: [],
                bracket: tw.bracket,
                customBracket: tw.finals?.customBracket || [],
                nextRounds: tw.finals?.nextRounds || [], // 다음 라운드 대진 설정
                finalsSize: tw.finals?.size || 8, // 본선 규모 (32강, 16강, 8강 등)
                loserBracket: tw.finals?.loserBracket || false, // 패자전 진행 여부
                topSeeds: tw.preliminary?.topSeeds || [], // 탑시드 목록
                preliminarySets: preliminarySets,
                finalsSets: finalsSets,
                advanceCount: tw.preliminary?.advanceCount || 2,
                wildcards: tw.preliminary?.wildcards || 0,
                sameGroupAvoid: tw.finals?.sameGroupAvoid || 'quarterfinal',
                referees: tw.referees || [],
                courts: tw.courts || [],
                createdAt: new Date().toISOString()
            };
            
            // 조 편성 (커스텀 또는 템플릿 모두)
            const needsGroups = (isCustom && tw.preliminary?.enabled) || 
                               (!isCustom && tournamentType !== 'knockout-only');
            
            if (needsGroups) {
                const participants = [...tw.participants];
                const groupCount = isCustom ? tw.preliminary.groupCount : (tw.preliminary?.groupCount || 4);
                const groups = Array(groupCount).fill(null).map(() => []);
                
                // 탑시드 지정 방식
                if (isCustom && tw.preliminary.groupAssignment === 'topSeed') {
                    const topSeeds = tw.preliminary.topSeeds || [];
                    
                    // 1. 탑시드를 각 조에 먼저 배치
                    topSeeds.forEach((seed, idx) => {
                        if (seed && idx < groupCount) {
                            groups[idx].push(seed);
                        }
                    });
                    
                    // 2. 나머지 선수들 랜덤 셔플
                    const remaining = participants.filter(p => !topSeeds.includes(p));
                    for (let i = remaining.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [remaining[i], remaining[j]] = [remaining[j], remaining[i]];
                    }
                    
                    // 3. 나머지 선수들 스네이크 드래프트로 배정
                    remaining.forEach((p, idx) => {
                        // 각 조에 이미 탑시드가 1명씩 있으므로 그 다음부터 배정
                        const totalPlaced = topSeeds.filter(s => s).length;
                        const adjustedIdx = idx;
                        const round = Math.floor((adjustedIdx + groupCount) / groupCount);
                        const groupIdx = round % 2 === 0 ? adjustedIdx % groupCount : groupCount - 1 - (adjustedIdx % groupCount);
                        groups[groupIdx].push(p);
                    });
                    
                    console.log('🏅 탑시드 배정 완료:', topSeeds);
                }
                // 랜덤 배정
                else if (isCustom && tw.preliminary.groupAssignment === 'random') {
                    for (let i = participants.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [participants[i], participants[j]] = [participants[j], participants[i]];
                    }
                    
                    // 스네이크 드래프트로 조 배정
                    participants.forEach((p, idx) => {
                        const round = Math.floor(idx / groupCount);
                        const groupIdx = round % 2 === 0 ? idx % groupCount : groupCount - 1 - (idx % groupCount);
                        groups[groupIdx].push(p);
                    });
                }
                // 템플릿 모드 기본 랜덤
                else {
                    for (let i = participants.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [participants[i], participants[j]] = [participants[j], participants[i]];
                    }
                    
                    participants.forEach((p, idx) => {
                        const round = Math.floor(idx / groupCount);
                        const groupIdx = round % 2 === 0 ? idx % groupCount : groupCount - 1 - (idx % groupCount);
                        groups[groupIdx].push(p);
                    });
                }
                
                project.groups = groups.map((members, idx) => ({
                    name: String.fromCharCode(65 + idx) + '조',
                    members: members,
                    matches: [],
                    standings: []
                }));
                
                // 조별 리그 경기 생성
                project.groups.forEach((group, gIdx) => {
                    const members = group.members;
                    for (let i = 0; i < members.length; i++) {
                        for (let j = i + 1; j < members.length; j++) {
                            const match = {
                                id: Date.now() + gIdx * 1000 + i * 100 + j,
                                player1Name: members[i],
                                player2Name: members[j],
                                type: isTeam ? 'team' : 'individual',
                                sets: isTeam ? 1 : preliminarySets,
                                winScore: winScore,
                                currentSet: 1,
                                setScores: [{ player1: 0, player2: 0 }],
                                currentServe: 'player1',
                                serveCount: 0,
                                serveSelected: false,
                                timeouts: { player1: 1, player2: 1 },
                                history: [],
                                status: 'pending',
                                groupIndex: gIdx,
                                groupName: group.name,
                                phase: 'preliminary',
                                refereePin: generatePin()
                            };
                            project.matches.push(match);
                            group.matches.push(match.id);
                        }
                    }
                });
            }
            
            // 토너먼트만인 경우 바로 본선 경기 생성
            if (tournamentType === 'knockout-only') {
                const participants = [...tw.participants];
                const size = isCustom ? (tw.finals?.size || 8) : (tw.knockoutSettings?.size || participants.length);
                
                // 랜덤 섞기
                for (let i = participants.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [participants[i], participants[j]] = [participants[j], participants[i]];
                }
                
                for (let i = 0; i < Math.min(participants.length, size); i += 2) {
                    const p1 = participants[i];
                    const p2 = participants[i + 1];
                    
                    if (p1 && p2) {
                        const match = {
                            id: Date.now() + i,
                            player1Name: p1,
                            player2Name: p2,
                            type: isTeam ? 'team' : 'individual',
                            sets: isTeam ? 1 : finalsSets,
                            winScore: winScore,
                            currentSet: 1,
                            setScores: [{ player1: 0, player2: 0 }],
                            currentServe: 'player1',
                            serveCount: 0,
                            serveSelected: false,
                            timeouts: { player1: 1, player2: 1 },
                            history: [],
                            status: 'pending',
                            bracketRound: 1,
                            bracketMatchNum: i / 2 + 1,
                            phase: 'finals',
                            refereePin: generatePin()
                        };
                        project.matches.push(match);
                    }
                }
            }
            
            // 프로젝트 저장
            projects.push(project);
            saveProjects();
            
            // 위자드 초기화
            window.tournamentWizard = null;
            
            // 생성된 프로젝트로 이동
            currentProject = project;
            announce(`${project.name} 대회가 생성되었습니다. ${project.matches.length}경기`);
            
            // 경기장이 등록되어 있으면 배정 화면으로 이동 제안
            if (project.courts && project.courts.length > 0) {
                if (confirm(`대회가 생성되었습니다!\n\n등록된 경기장: ${project.courts.map(c => c.name).join(', ')}\n\n지금 심판/경기장을 배정하시겠습니까?`)) {
                    goTo('edit-matches');
                    return;
                }
            }
            
            // 프로젝트 관리 화면으로 이동
            goTo('project-manage');
        }

        // 최초 운영자 등록
        async function setupFirstOperator() {
            const name = document.getElementById('first-operator-name')?.value.trim();

            const password = document.getElementById('first-operator-password')?.value;

                return;
            }
            
            // 이메일 형식 검증
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                alert('올바른 이메일 형식을 입력하세요.');
                return;
            }
            
            if (!password || password.length < 6) {
                alert('비밀번호는 6자 이상이어야 합니다.');
                return;

            if (password !== confirmPassword) {
                alert('비밀번호가 일치하지 않습니다.');

            }
            
            // 등록 버튼 비활성화

                registerBtn.textContent = '등록 중...';
            }
            
            let firebaseSuccess = false;
            
            // Firebase Auth 시도 (실패해도 로컬 모드로 계속 진행)
            if (auth) {
                try {
                    const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                    const user = userCredential.user;
                    await user.updateProfile({ displayName: name });
                    firebaseSuccess = true;
                    console.log('Firebase Auth 등록 성공');
                } catch (error) {
                    console.warn('Firebase Auth 실패, 로컬 모드로 전환:', error.code, error.message);

                }
            }
            
            // 로컬에 저장 (Firebase 성공/실패 관계없이)
            const operators = [{
                name: name,
                email: email,
                password: password,
                role: 'super',
                firebaseAuth: firebaseSuccess,
                createdAt: new Date().toISOString()

        // 운영자 삭제
        function deleteOperator(idx) {
            const currentOperator = JSON.parse(sessionStorage.getItem('currentOperator') || 'null');
            if (!currentOperator || currentOperator.role !== 'super') {
                alert('최고 관리자만 운영자를 삭제할 수 있습니다.');
                return;
            }
            
            const operators = JSON.parse(localStorage.getItem('operators') || '[]');
            const targetOp = operators[idx];
            
            // 자기 자신은 삭제 불가
            if (targetOp.name === currentOperator.name) {
                alert('자기 자신은 삭제할 수 없습니다.');
                return;
            }
            
            // 마지막 최고 관리자는 삭제 불가
            if (targetOp.role === 'super' && operators.filter(op => op.role === 'super').length <= 1) {
                alert('최소 1명의 최고 관리자가 필요합니다.');
                return;
            }
            
            if (confirm(`"${targetOp.name}" 운영자를 삭제하시겠습니까?`)) {
                operators.splice(idx, 1);
                localStorage.setItem('operators', JSON.stringify(operators));
                syncOperatorsToFirebase(operators); // Firebase 동기화
                announce(`운영자 삭제됨`);
                render();
            }
        }

                return;
            }

            const roleLabel = newRole === 'super' ? '최고 관리자' : '일반 관리자';

                operators[idx].role = newRole;

                syncOperatorsToFirebase(operators); // Firebase 동기화

        // 내 비밀번호 변경
        async function changeMyPassword() {
            const currentOperator = JSON.parse(sessionStorage.getItem('currentOperator') || 'null');
            if (!currentOperator) {
                alert('로그인이 필요합니다.');
                return;
            }
            
            const currentPw = prompt('현재 비밀번호를 입력하세요:');
            if (!currentPw) return;
            
            const newPw = prompt('새 비밀번호를 입력하세요 (6자 이상):');
            if (!newPw || newPw.length < 6) {
                alert('비밀번호는 6자 이상이어야 합니다.');
                return;
            }
            
            const confirmPw = prompt('새 비밀번호를 다시 입력하세요:');
            if (newPw !== confirmPw) {
                alert('비밀번호가 일치하지 않습니다.');
                return;
            }
            
            try {
                if (auth && auth.currentUser) {
                    // Firebase Auth 비밀번호 변경
                    const credential = firebase.auth.EmailAuthProvider.credential(
                        currentOperator.email,
                        currentPw
                    );
                    
                    // 재인증
                    await auth.currentUser.reauthenticateWithCredential(credential);
                    
                    // 새 비밀번호로 변경
                    await auth.currentUser.updatePassword(newPw);
                }
                
                // 로컬 저장소 업데이트
                const operators = JSON.parse(localStorage.getItem('operators') || '[]');
                const idx = operators.findIndex(op => op.email === currentOperator.email);
                
                if (idx >= 0) {

        function checkPasswordStrength() {
            const pw = document.getElementById('new-bracket-pin')?.value || '';
            const display = document.getElementById('pw-strength');
            if (!display) return;
            
            const checks = {
                length: pw.length >= 8,
                upper: /[A-Z]/.test(pw),
                lower: /[a-z]/.test(pw),
                number: /[0-9]/.test(pw),
                special: /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(pw)
            };
            
            const passed = Object.values(checks).filter(v => v).length;
            
            let html = '';
            html += `<div style="color:${checks.length ? '#4caf50' : '#999'};">${checks.length ? '✅' : '⬜'} 8자 이상</div>`;
            html += `<div style="color:${checks.upper ? '#4caf50' : '#999'};">${checks.upper ? '✅' : '⬜'} 영문 대문자</div>`;
            html += `<div style="color:${checks.lower ? '#4caf50' : '#999'};">${checks.lower ? '✅' : '⬜'} 영문 소문자</div>`;
            html += `<div style="color:${checks.number ? '#4caf50' : '#999'};">${checks.number ? '✅' : '⬜'} 숫자</div>`;
            html += `<div style="color:${checks.special ? '#4caf50' : '#999'};">${checks.special ? '✅' : '⬜'} 특수문자</div>`;
            
            if (passed === 5) {
                html += `<div style="color:#4caf50; font-weight:600; margin-top:8px;">🔒 강력한 비밀번호!</div>`;
            }
            
            display.innerHTML = html;
        }
        
        function validatePassword(pw) {
            if (pw.length < 8) return '비밀번호는 8자 이상이어야 합니다.';
            if (!/[A-Z]/.test(pw)) return '영문 대문자를 1개 이상 포함해야 합니다.';
            if (!/[a-z]/.test(pw)) return '영문 소문자를 1개 이상 포함해야 합니다.';
            if (!/[0-9]/.test(pw)) return '숫자를 1개 이상 포함해야 합니다.';
            if (!/[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(pw)) return '특수문자를 1개 이상 포함해야 합니다.';
            return null;
        }

        // 심판 비밀번호 추가 (관리자용)
        function addRefereePassword() {
            const pin = prompt('심판 PIN을 입력하세요:\n(예: REF001, 심판1)');
            if (!pin) return;
            
            const password = prompt('심판 비밀번호를 입력하세요:\n(8자 이상, 대소문자+숫자+특수문자)');
            if (!password) return;
            
            const error = validatePassword(password);
            if (error) {
                alert(error);
                return;
            }
            
            const confirmPassword = prompt('비밀번호를 다시 입력하세요:');
            if (confirmPassword !== password) {
                alert('비밀번호가 일치하지 않습니다');
                return;
            }
            
            const refPasswords = JSON.parse(localStorage.getItem('refereePasswords') || '{}');
            if (refPasswords[pin]) {
                alert('이미 등록된 심판입니다');
                return;
            }
            
            refPasswords[pin] = password;
            localStorage.setItem('refereePasswords', JSON.stringify(refPasswords));
            announce(`${pin} 심판이 등록되었습니다`);
        }
        
        // 심판 비밀번호 삭제 (관리자용)
        function deleteRefereePassword() {
            const refPasswords = JSON.parse(localStorage.getItem('refereePasswords') || '{}');
            const pins = Object.keys(refPasswords);
            
            if (pins.length === 0) {
                alert('등록된 심판이 없습니다');
                return;
            }
            
            const pinList = pins.join('\n');
            const pin = prompt(`삭제할 심판 PIN을 입력하세요:\n\n등록된 심판:\n${pinList}`);
            
            if (!pin) return;
            
            if (!refPasswords[pin]) {
                alert('등록되지 않은 심판입니다');
                return;
            }
            
            if (!confirm(`${pin} 심판을 삭제하시겠습니까?`)) return;
            
            delete refPasswords[pin];
            localStorage.setItem('refereePasswords', JSON.stringify(refPasswords));
            announce(`${pin} 심판이 삭제되었습니다`);
        }
        
        // ========== 선수 일정 조회 함수 ==========
        function onScheduleProjectChange() {
            const select = document.getElementById('schedule-project');
            const area = document.getElementById('participant-select-area');
            const nameSelect = document.getElementById('schedule-name-select');
            const result = document.getElementById('schedule-result');
            
            if (!select.value) {
                area.style.display = 'none';
                result.innerHTML = '';
                return;
            }
            
            const project = projects[parseInt(select.value)];
            if (!project) return;
            
            area.style.display = 'block';
            result.innerHTML = '';
            
            // 참가자 목록 수집
            let participants = [];
            if (project.groups && project.groups.length > 0) {
                project.groups.forEach(g => {
                    participants = participants.concat(g.members || []);
                });
            } else if (project.players && project.players.length > 0) {
                participants = project.players;
            } else if (project.teams && project.teams.length > 0) {
                participants = project.teams.map(t => t.name || t);
            }
            
            // 중복 제거
            participants = [...new Set(participants)];
            
            // 정렬
            participants.sort((a, b) => a.localeCompare(b, 'ko'));
            
            nameSelect.innerHTML = '<option value="">-- 목록에서 선택 --</option>' + 
                participants.map(p => `<option value="${p}">${p}</option>`).join('');
        }
        
        function onScheduleNameSelect() {
            const select = document.getElementById('schedule-name-select');
            const input = document.getElementById('schedule-name-input');
            if (select.value) {
                input.value = select.value;
            }
        }
        
        function lookupSchedule() {
            const projectIdx = document.getElementById('schedule-project')?.value;
            const name = document.getElementById('schedule-name-input')?.value.trim() || 
                         document.getElementById('schedule-name-select')?.value;
            
            if (!projectIdx || !name) {
                alert('대회와 이름을 선택해주세요.');
                return;
            }
            
            const project = projects[parseInt(projectIdx)];
            if (!project) return;
            
            const resultDiv = document.getElementById('schedule-result');
            
            // 해당 선수의 경기 찾기
            const myMatches = project.matches.filter(m => 
                m.player1Name === name || m.player2Name === name
            );
            
            if (myMatches.length === 0) {
                resultDiv.innerHTML = `
                    <div style="text-align:center; padding:20px; background:#fff3e0; border-radius:8px;">
                        <span style="font-size:24px;">🔍</span>
                        <p style="margin-top:8px;">"${name}"의 경기를 찾을 수 없습니다.</p>
                        <p style="font-size:13px; color:#666;">이름을 정확히 입력했는지 확인해주세요.</p>
                    </div>
                `;
                return;
            }
            
            // 경기 분류
            const pending = myMatches.filter(m => m.status !== 'completed');
            const completed = myMatches.filter(m => m.status === 'completed');
            
            // 다음 경기 (대기 중인 첫 번째 경기)
            const nextMatch = pending[0];
            
            // 전적 계산
            let wins = 0, losses = 0;
            completed.forEach(m => {
                const isP1 = m.player1Name === name;
                const p1Sets = m.setScores.filter(s => s.player1 > s.player2).length;
                const p2Sets = m.setScores.filter(s => s.player2 > s.player1).length;
                if ((isP1 && p1Sets > p2Sets) || (!isP1 && p2Sets > p1Sets)) {
                    wins++;
                } else if (p1Sets !== p2Sets) {
                    losses++;
                }
            });
            
            // 내 조 찾기
            let myGroup = null;
            if (project.groups) {
                project.groups.forEach(g => {
                    if (g.members && g.members.includes(name)) {
                        myGroup = g;
                    }
                });
            }
            
            // 토너먼트 라운드 정보
            const knockoutMatches = project.matches.filter(m => m.bracketRound);
            const maxRound = knockoutMatches.length > 0 ? Math.max(...knockoutMatches.map(m => m.bracketRound)) : 0;
            
            // 결과 표시
            let html = `
                <div style="background:linear-gradient(135deg, #667eea 0%, #764ba2 100%); color:white; padding:16px; border-radius:12px; margin-bottom:16px;">
                    <div style="font-size:24px; font-weight:700;">${name}</div>
                    ${myGroup ? `<div style="opacity:0.9; margin-top:4px;">${myGroup.name}</div>` : ''}
                    <div style="display:flex; gap:16px; margin-top:12px;">
                        <div style="text-align:center;">
                            <div style="font-size:20px; font-weight:600;">${wins}</div>
                            <div style="font-size:12px; opacity:0.8;">승</div>
                        </div>
                        <div style="text-align:center;">
                            <div style="font-size:20px; font-weight:600;">${losses}</div>
                            <div style="font-size:12px; opacity:0.8;">패</div>
                        </div>
                        <div style="text-align:center;">
                            <div style="font-size:20px; font-weight:600;">${myMatches.length}</div>
                            <div style="font-size:12px; opacity:0.8;">총 경기</div>
                        </div>
                    </div>
                </div>
            `;
            
            // 다음 경기
            if (nextMatch) {
                const opponent = nextMatch.player1Name === name ? nextMatch.player2Name : nextMatch.player1Name;
                const isTBD = opponent === 'TBD';
                const roundName = nextMatch.bracketRound ? getRoundName(nextMatch.bracketRound, maxRound + 1) : null;
                
                html += `
                    <div style="background:#e3f2fd; padding:16px; border-radius:8px; margin-bottom:16px;">
                        <div style="font-weight:600; margin-bottom:8px;">⏭️ 다음 경기</div>
                        <div style="font-size:18px; font-weight:600;">
                            ${isTBD ? '🔜 상대 미정 (이전 경기 결과 대기 중)' : `vs ${opponent}`}
                        </div>
                        <div style="font-size:13px; color:#666; margin-top:4px;">
                            ${roundName ? `${roundName}` : ''}
                            ${nextMatch.groupName ? nextMatch.groupName : ''}
                        </div>
                    </div>
                `;
            } else if (project.tournamentType === 'group-knockout' && myGroup) {
                // 조별 리그 진행 중이면 본선 진출 안내
                const groupMatches = project.matches.filter(m => m.groupIndex !== undefined);
                const completedGroupMatches = groupMatches.filter(m => m.status === 'completed');
                
                if (completedGroupMatches.length < groupMatches.length) {
                    html += `
                        <div style="background:#fff3e0; padding:16px; border-radius:8px; margin-bottom:16px;">
                            <div style="font-weight:600; margin-bottom:8px;">조별 리그 진행 중</div>
                            <div style="font-size:14px; color:#666;">
                                조별 리그 완료 후 본선 토너먼트가 시작됩니다.
                            </div>
                        </div>
                    `;
                }
            }
            
            // 대기 중인 경기
            if (pending.length > 0) {
                html += `
                    <div style="margin-bottom:16px;">
                        <h4 style="margin:0 0 8px 0;">⏳ 대기 중인 경기 (${pending.length})</h4>
                        ${pending.map(m => {
                            const opponent = m.player1Name === name ? m.player2Name : m.player1Name;
                            const isTBD = opponent === 'TBD';
                            const roundName = m.bracketRound ? getRoundName(m.bracketRound, maxRound + 1) : null;
                            
                            return `
                                <div style="padding:10px; margin:4px 0; background:#fff3e0; border-radius:6px; display:flex; justify-content:space-between; align-items:center;">
                                    <span>${isTBD ? '🔜 상대 미정' : `vs ${opponent}`}</span>
                                    <span style="font-size:12px; color:#666;">
                                        ${roundName ? `${roundName}` : ''}
                                        ${m.groupName || ''}
                                    </span>
                                </div>
                            `;
                        }).join('')}
                    </div>
                `;
            }
            
            // 완료된 경기
            if (completed.length > 0) {
                html += `
                    <div>
                        <h4 style="margin:0 0 8px 0;">완료된 경기 (${completed.length})</h4>
                        ${completed.filter(m => !m.isBye).map(m => {
                            const isP1 = m.player1Name === name;
                            const opponent = isP1 ? m.player2Name : m.player1Name;
                            const scores = m.setScores.map(s => isP1 ? `${s.player1}-${s.player2}` : `${s.player2}-${s.player1}`).join(', ');
                            const p1Sets = m.setScores.filter(s => s.player1 > s.player2).length;
                            const p2Sets = m.setScores.filter(s => s.player2 > s.player1).length;
                            const won = (isP1 && p1Sets > p2Sets) || (!isP1 && p2Sets > p1Sets);
                            const roundName = m.bracketRound ? getRoundName(m.bracketRound, maxRound + 1) : null;
                            
                            return `
                                <div style="padding:10px; margin:4px 0; background:${won ? '#e8f5e9' : '#ffebee'}; border-radius:6px;">
                                    <div style="display:flex; justify-content:space-between;">
                                        <span>${won ? '🏆' : ''} vs ${opponent}</span>
                                        <span style="font-weight:600; color:${won ? '#4caf50' : '#f44336'};">${won ? '승' : '패'}</span>
                                    </div>
                                    <div style="font-size:12px; color:#666; margin-top:4px;">
                                        ${roundName ? `${roundName} · ` : ''}${m.groupName ? `${m.groupName} · ` : ''}${scores}
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                `;
            }
            
            resultDiv.innerHTML = html;
        }
        // ========== 선수 일정 조회 함수 끝 ==========
        
        // ========== 토너먼트 진행 함수 ==========
        function processTournamentProgression(match, winner) {
            if (!currentProject) return;
            
            const p = currentProject;
            
            // 1. 토너먼트 경기인 경우 다음 라운드 처리
            if (match.bracketRound) {
                advanceTournamentWinner(p, match, winner);
            }
            
            // 2. 조별 리그 경기인 경우 조별 리그 완료 여부 체크
            if (match.groupIndex !== undefined && p.tournamentType === 'group-knockout') {
                checkGroupStageCompletion(p);
            }
        }
        
        function advanceTournamentWinner(project, match, winner) {
            const currentRound = match.bracketRound;
            const matchNum = match.bracketMatchNum;
            
            // 패자 확인
            const loser = match.player1Name === winner ? match.player2Name : match.player1Name;
            
            // 현재 라운드 경기 수 확인
            const sameRoundMatches = project.matches.filter(m => 
                m.bracketRound === currentRound && !m.isLoserBracket
            );
            
            // 결승전(1경기만 있는 라운드)이면 대회 종료
            if (sameRoundMatches.length === 1 && !match.isLoserBracket) {
                project.tournamentWinner = winner;
                project.status = 'completed';
                saveProjects();
                announce(`🏆 우승: ${winner}!`);
                return;
            }
            
            // 패자전 경기인 경우 패자전 진출 처리
            if (match.isLoserBracket) {
                advanceLoserBracketWinner(project, match, winner, loser);
                saveProjects();
                return;
            }
            
            // 4강(2경기 라운드)이면 패자를 3/4위전에 배정
            if (sameRoundMatches.length === 2) {
                assignThirdPlaceMatch(project, match, loser);
            }
            
            // 패자전 진행 시 - 8강 이상 패자를 패자전에 배정
            if (project.loserBracket && sameRoundMatches.length >= 4) {
                assignLoserBracket(project, match, loser, sameRoundMatches.length);
            }
            
            // 커스텀 nextRounds 설정 확인
            const nextRoundsConfig = project.nextRounds || [];
            
            // 현재 라운드에 해당하는 다음 라운드 설정 찾기
            // currentRound가 1이면 nextRounds[0] (8강→4강 등)
            const roundConfigIndex = currentRound - 1;
            const nextRoundConfig = nextRoundsConfig[roundConfigIndex];
            
            let nextMatchNum = null;
            let isPlayer1 = true;
            
            if (nextRoundConfig && nextRoundConfig.matches) {
                // 커스텀 설정에서 현재 경기 승자가 어디로 가는지 찾기
                nextRoundConfig.matches.forEach((m, idx) => {
                    if (m.p1Match === matchNum) {
                        nextMatchNum = idx + 1;
                        isPlayer1 = true;
                    } else if (m.p2Match === matchNum) {
                        nextMatchNum = idx + 1;
                        isPlayer1 = false;
                    }
                });
                
                if (nextMatchNum) {
                    console.log(`🏆 커스텀 진출: 경기${matchNum} 승자(${winner}) → ${nextRoundConfig.name} 경기${nextMatchNum} (${isPlayer1 ? 'P1' : 'P2'})`);
                }
            }
            
            // 커스텀 설정이 없으면 기본 로직 (1vs2 → 다음1, 3vs4 → 다음2)
            if (nextMatchNum === null) {
                nextMatchNum = Math.ceil(matchNum / 2);
                isPlayer1 = (matchNum % 2 === 1);
                console.log(`🏆 기본 진출: 경기${matchNum} 승자(${winner}) → 다음 경기${nextMatchNum} (${isPlayer1 ? 'P1' : 'P2'})`);
            }
            
            const nextRound = currentRound + 1;
            
            // 다음 라운드 경기 찾기
            let nextMatch = project.matches.find(m => 
                m.bracketRound === nextRound && m.bracketMatchNum === nextMatchNum && !m.isLoserBracket
            );
            
            // 다음 라운드 경기가 없으면 생성
            if (!nextMatch) {
                const isTeam = project.competitionType === 'team';
                const sets = project.finalsSets || (isTeam ? 1 : 3);
                const winScore = isTeam ? 31 : 11;
                
                nextMatch = {
                    id: Date.now() + nextRound * 100 + nextMatchNum + Math.floor(Math.random() * 100),
                    player1Name: isPlayer1 ? winner : 'TBD',
                    player2Name: isPlayer1 ? 'TBD' : winner,
                    type: project.competitionType,
                    sets: sets,
                    winScore: winScore,
                    currentSet: 1,
                    setScores: [{ player1: 0, player2: 0 }],
                    currentServe: null,
                    serveCount: 0,
                    serveSelected: false,
                    timeouts: { player1: 1, player2: 1 },
                    history: [],
                    status: 'pending',
                    bracketRound: nextRound,
                    bracketMatchNum: nextMatchNum,
                    roundName: nextRoundConfig?.name || null,
                    refereePin: generatePin()
                };
                project.matches.push(nextMatch);
            } else {
                // 기존 다음 라운드 경기에 승자 배정
                if (isPlayer1) {
                    nextMatch.player1Name = winner;
                } else {
                    nextMatch.player2Name = winner;
                }
                
                // 두 선수 모두 결정되면 경기 준비 완료
                if (nextMatch.player1Name !== 'TBD' && nextMatch.player2Name !== 'TBD') {
                    nextMatch.status = 'ready';
                    console.log(`🏆 다음 경기 준비 완료: ${nextMatch.player1Name} vs ${nextMatch.player2Name}`);
                }
            }
            
            saveProjects();
        }
        
        // 패자전 배정 (8강 패자 → 5-8위전, 16강 패자 → 9-16위전)
        function assignLoserBracket(project, match, loser, roundMatchCount) {
            const isTeam = project.competitionType === 'team';
            const winScore = isTeam ? 31 : 11;
            const matchNum = match.bracketMatchNum;
            
            // 라운드별 순위 결정전 이름
            // 8강(4경기) → 5-8위전, 16강(8경기) → 9-16위전
            const startRank = roundMatchCount + 1;
            const endRank = roundMatchCount * 2;
            const loserRoundName = `${startRank}-${endRank}위전`;
            
            // 패자전 경기 번호: 1vs2→1, 3vs4→2 (기본)
            const loserMatchNum = Math.ceil(matchNum / 2);
            const isPlayer1 = (matchNum % 2 === 1);
            
            // 해당 패자전 경기 찾기
            let loserMatch = project.matches.find(m => 
                m.isLoserBracket && 
                m.loserRoundName === loserRoundName && 
                m.loserMatchNum === loserMatchNum
            );
            
            if (!loserMatch) {
                // 패자전 경기 생성
                loserMatch = {
                    id: Date.now() + 8000 + loserMatchNum + Math.floor(Math.random() * 100),
                    player1Name: isPlayer1 ? loser : 'TBD',
                    player2Name: isPlayer1 ? 'TBD' : loser,
                    type: project.competitionType,
                    sets: 3, // 패자전은 3세트
                    winScore: winScore,
                    currentSet: 1,
                    setScores: [{ player1: 0, player2: 0 }],
                    currentServe: null,
                    serveCount: 0,
                    serveSelected: false,
                    timeouts: { player1: 1, player2: 1 },
                    history: [],
                    status: 'pending',
                    isLoserBracket: true,
                    loserRoundName: loserRoundName,
                    loserMatchNum: loserMatchNum,
                    loserRoundSize: roundMatchCount, // 원래 라운드 경기 수 (4=8강, 8=16강)
                    roundName: loserRoundName,
                    refereePin: generatePin()
                };
                project.matches.push(loserMatch);
                console.log(`📉 패자전 생성: ${loser} → ${loserRoundName} 경기${loserMatchNum}`);
            } else {
                // 기존 패자전 경기에 배정
                if (isPlayer1) {
                    loserMatch.player1Name = loser;
                } else {
                    loserMatch.player2Name = loser;
                }
                
                if (loserMatch.player1Name !== 'TBD' && loserMatch.player2Name !== 'TBD') {
                    loserMatch.status = 'ready';
                    console.log(`📉 ${loserRoundName} 경기${loserMatchNum} 준비 완료: ${loserMatch.player1Name} vs ${loserMatch.player2Name}`);
                }
            }
        }
        
        // 패자전 승자 진출 처리
        function advanceLoserBracketWinner(project, match, winner, loser) {
            const loserRoundSize = match.loserRoundSize;
            const matchNum = match.loserMatchNum;
            const isTeam = project.competitionType === 'team';
            const winScore = isTeam ? 31 : 11;
            
            // 다음 패자전 라운드 결정
            // 5-8위전(2경기) 승자 → 5/6위전, 패자 → 7/8위전
            const nextLoserMatchCount = loserRoundSize / 2;
            
            if (nextLoserMatchCount >= 1) {
                // 승자용 다음 라운드
                const startRank = loserRoundSize + 1;
                const midRank = startRank + nextLoserMatchCount - 1;
                const winnerRoundName = `${startRank}/${midRank + 1}위전`;
                
                // 패자용 다음 라운드
                const loserStartRank = midRank + 1;
                const loserEndRank = loserRoundSize * 2;
                const loserNextRoundName = `${loserStartRank}/${loserEndRank}위전`;
                
                // 승자 진출
                assignNextLoserMatch(project, winner, winnerRoundName, matchNum, true, winScore, isTeam);
                
                // 패자 진출 (마지막 라운드가 아닌 경우)
                if (nextLoserMatchCount >= 2) {
                    assignNextLoserMatch(project, loser, loserNextRoundName, matchNum, false, winScore, isTeam);
                }
            }
        }
        
        // 다음 패자전 경기 배정
        function assignNextLoserMatch(project, player, roundName, prevMatchNum, isWinner, winScore, isTeam) {
            const nextMatchNum = Math.ceil(prevMatchNum / 2);
            const isPlayer1 = (prevMatchNum % 2 === 1);
            
            let nextMatch = project.matches.find(m => 
                m.isLoserBracket && 
                m.roundName === roundName && 
                m.loserMatchNum === nextMatchNum
            );
            
            if (!nextMatch) {
                nextMatch = {
                    id: Date.now() + 9000 + nextMatchNum + Math.floor(Math.random() * 100),
                    player1Name: isPlayer1 ? player : 'TBD',
                    player2Name: isPlayer1 ? 'TBD' : player,
                    type: isTeam ? 'team' : 'individual',
                    sets: 3,
                    winScore: winScore,
                    currentSet: 1,
                    setScores: [{ player1: 0, player2: 0 }],
                    currentServe: null,
                    serveCount: 0,
                    serveSelected: false,
                    timeouts: { player1: 1, player2: 1 },
                    history: [],

        function checkGroupStageCompletion(project) {
            if (!project.groups || project.groups.length === 0) return;
            
            // 조별 리그 경기가 모두 완료되었는지 확인
            const groupMatches = project.matches.filter(m => m.groupIndex !== undefined);
            const completedGroupMatches = groupMatches.filter(m => m.status === 'completed');
            
            if (groupMatches.length === 0 || completedGroupMatches.length < groupMatches.length) {
                return; // 아직 조별 리그 진행 중
            }
            
            // 이미 본선 생성됨?
            const knockoutMatches = project.matches.filter(m => m.bracketRound);
            if (knockoutMatches.length > 0) return;
            
            // 조별 순위 계산 및 본선 진출자 결정
            const advanceCount = project.groupSettings?.advanceCount || 2;
            const knockoutSize = project.knockoutSettings?.size || 8;
            
            const advancers = [];
            
            project.groups.forEach((group, gIdx) => {
                const standings = calculateGroupStandings(project, gIdx);
                const groupAdvancers = standings.slice(0, advanceCount);
                advancers.push(...groupAdvancers.map((s, rank) => ({
                    name: s.name,
                    group: group.name,
                    rank: rank + 1,
                    seed: gIdx * advanceCount + rank + 1
                })));
            });
            
            // 본선 대진표 생성 (시드 배정)
            generateKnockoutBracket(project, advancers, knockoutSize);
            
            announce(`조별 리그 완료! 본선 ${knockoutSize}강 대진표 생성`);

        function calculateGroupStandings(project, groupIndex) {
            const group = project.groups[groupIndex];
            if (!group) return [];
            
            const records = {};
            group.members.forEach(m => {
                records[m] = { name: m, wins: 0, losses: 0, setsWon: 0, setsLost: 0, pointsFor: 0, pointsAgainst: 0 };
            });
            
            const groupMatches = project.matches.filter(m => 
                m.groupIndex === groupIndex && m.status === 'completed'
            );
            
            groupMatches.forEach(m => {
                const p1 = m.player1Name;
                const p2 = m.player2Name;
                
                if (!records[p1] || !records[p2]) return;
                
                let p1Sets = 0, p2Sets = 0;
                m.setScores.forEach(s => {
                    if (s.player1 > s.player2) p1Sets++;
                    else if (s.player2 > s.player1) p2Sets++;
                    
                    records[p1].pointsFor += s.player1;
                    records[p1].pointsAgainst += s.player2;
                    records[p2].pointsFor += s.player2;
                    records[p2].pointsAgainst += s.player1;
                });
                
                records[p1].setsWon += p1Sets;
                records[p1].setsLost += p2Sets;
                records[p2].setsWon += p2Sets;
                records[p2].setsLost += p1Sets;
                
                if (p1Sets > p2Sets) {
                    records[p1].wins++;
                    records[p2].losses++;
                } else {
                    records[p2].wins++;
                    records[p1].losses++;
                }
            });
            
            // 정렬: 승수 > 세트득실 > 점수득실
            return Object.values(records).sort((a, b) => {
                if (b.wins !== a.wins) return b.wins - a.wins;
                const aSetDiff = a.setsWon - a.setsLost;
                const bSetDiff = b.setsWon - b.setsLost;
                if (bSetDiff !== aSetDiff) return bSetDiff - aSetDiff;
                const aPointDiff = a.pointsFor - a.pointsAgainst;
                const bPointDiff = b.pointsFor - b.pointsAgainst;
                return bPointDiff - aPointDiff;
            });
        }
        
        function generateKnockoutBracket(project, advancers, size) {
            // 시드 배정 (1번 시드 vs 마지막 시드가 결승에서 만나도록)
            const seededOrder = [];
            
            // 기본 시드 배치 (8강 예시: 1-8, 4-5, 2-7, 3-6)
            function getSeedOrder(n) {
                if (n === 2) return [1, 2];
                const half = getSeedOrder(n / 2);
                const result = [];
                half.forEach(seed => {
                    result.push(seed);
                    result.push(n + 1 - seed);
                });
                return result;
            }
            
            const seedOrder = getSeedOrder(size);
            
            // 대진 생성
            for (let i = 0; i < size; i += 2) {
                const seed1 = seedOrder[i];
                const seed2 = seedOrder[i + 1];
                
                const p1 = advancers.find(a => a.seed === seed1);
                const p2 = advancers.find(a => a.seed === seed2);
                
                const match = {
                    id: Date.now() + i,
                    player1Name: p1 ? p1.name : 'BYE',
                    player2Name: p2 ? p2.name : 'BYE',
                    type: project.competitionType,
                    sets: project.competitionType === 'individual' ? 3 : 1,
                    winScore: project.competitionType === 'individual' ? 11 : 31,
                    currentSet: 1,
                    setScores: [{ player1: 0, player2: 0 }],
                    currentServe: 'player1',
                    serveCount: 0,
                    serveSelected: false,
                    timeouts: { player1: 1, player2: 1 },
                    history: [],
                    status: 'pending',
                    bracketRound: 1,
                    bracketMatchNum: (i / 2) + 1,
                    refereePin: generatePin()
                };
                
                // BYE 처리 - 상대가 자동 진출
                if (p1 && !p2) {
                    match.status = 'completed';
                    match.winner = p1.name;
                    match.setScores = [{ player1: 0, player2: 0 }];
                    match.isBye = true;
                } else if (p2 && !p1) {
                    match.status = 'completed';
                    match.winner = p2.name;
                    match.setScores = [{ player1: 0, player2: 0 }];
                    match.isBye = true;
                }
                
                project.matches.push(match);
                
                // BYE 승자는 바로 다음 라운드로 진출
                if (match.isBye && match.winner) {
                    advanceTournamentWinner(project, match, match.winner);
                }
            }
        }

        // 기본 대진표 생성 (커스텀이 없을 때)
        function generateDefaultFinals(project, groupStandings, advanceCount, sets, finalsSize) {
            const isTeam = project.competitionType === 'team';
            const winScore = isTeam ? 31 : 11;
            const groupNames = Object.keys(groupStandings).sort();
            const roundName = getRoundNameBySize(finalsSize);
            
            // 진출자 목록 생성
            const advancers = [];
            groupNames.forEach(groupName => {
                const standings = groupStandings[groupName];
                for (let rank = 0; rank < advanceCount && rank < standings.length; rank++) {
                    advancers.push({
                        name: standings[rank].name,
                        group: groupName,
                        rank: rank + 1
                    });
                }
            });
            
            console.log('🏆 기본 본선 대진표 생성:', advancers.length + '명 진출,', roundName);
            
            // 크로스 대진 생성 (A1 vs B2, A2 vs B1, C1 vs D2, C2 vs D1...)
            let matchNum = 0;
            for (let i = 0; i < advancers.length; i += 4) {
                // 4명씩 묶어서 크로스 대진
                const a1 = advancers[i];     // A조 1위
                const a2 = advancers[i + 1]; // A조 2위
                const b1 = advancers[i + 2]; // B조 1위
                const b2 = advancers[i + 3]; // B조 2위
                
                if (a1 && b2) {
                    matchNum++;
                    const match1 = createKnockoutMatch(a1.name, b2.name, matchNum, sets, winScore, isTeam, finalsSize, roundName);
                    project.matches.push(match1);
                }
                if (a2 && b1) {
                    matchNum++;
                    const match2 = createKnockoutMatch(a2.name, b1.name, matchNum, sets, winScore, isTeam, finalsSize, roundName);
                    project.matches.push(match2);
                }
            }
            
            // 프로젝트에 본선 규모 저장
            project.finalsSize = finalsSize;
        }

        function shuffleGroups() {
            const p = currentProject;
            if (!p || !p.groups || p.groups.length === 0) return;
            
            if (!confirm('조를 다시 섞으시겠습니까? 진행된 경기 기록이 초기화됩니다.')) return;
            
            // 모든 멤버 수집
            const allMembers = [];
            p.groups.forEach(g => allMembers.push(...g.members));
            
            // 섞기
            for (let i = allMembers.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [allMembers[i], allMembers[j]] = [allMembers[j], allMembers[i]];
            }
            
            // 다시 배정
            const groupCount = p.groups.length;
            p.groups.forEach((g, idx) => {
                g.members = [];
                g.matches = [];
            });
            
            allMembers.forEach((member, idx) => {
                const round = Math.floor(idx / groupCount);
                const groupIdx = round % 2 === 0 ? idx % groupCount : groupCount - 1 - (idx % groupCount);
                p.groups[groupIdx].members.push(member);
            });
            
            // 경기 재생성
            p.matches = [];
            p.groups.forEach((group, gIdx) => {
                const members = group.members;
                for (let i = 0; i < members.length; i++) {
                    for (let j = i + 1; j < members.length; j++) {
                        const match = {
                            id: Date.now() + gIdx * 1000 + i * 100 + j,
                            player1Name: members[i],
                            player2Name: members[j],
                            type: p.competitionType,
                            sets: p.competitionType === 'individual' ? 3 : 1,
                            winScore: p.competitionType === 'individual' ? 11 : 31,
                            currentSet: 1,
                            setScores: [{ player1: 0, player2: 0 }],
                            currentServe: 'player1',
                            serveCount: 0,
                            serveSelected: false,
                            timeouts: { player1: 1, player2: 1 },
                            history: [],
                            status: 'pending',
                            groupIndex: gIdx,
                            groupName: group.name,
                            refereePin: generatePin()
                        };
                        p.matches.push(match);
                        group.matches.push(match.id);
                    }
                }
            });
            
            saveProjects();
            announce('조가 다시 편성되었습니다');
            render();
        }

                        <button id="auto-sched-confirm" style="flex:1;padding:12px;border:none;border-radius:6px;background:#2196f3;color:white;cursor:pointer;font-weight:600;">생성</button>

            document.body.appendChild(modal);

            document.getElementById('auto-sched-cancel').onclick = () => modal.remove();
            document.getElementById('auto-sched-confirm').onclick = () => {
                const startDate = document.getElementById('auto-sched-date').value;
                const startTime = document.getElementById('auto-sched-time').value;
                const intervalMinutes = parseInt(document.getElementById('auto-sched-interval').value);

                let currentDateTime = new Date(`${startDate}T${startTime}`);

                currentProject.matches.forEach((match, idx) => {
                    match.scheduledDate = currentDateTime.toISOString().split('T')[0];
                    match.scheduledTime = currentDateTime.toTimeString().slice(0, 5);
                    match.estimatedDuration = intervalMinutes - 15;
                    match.matchOrder = idx + 1;
                    currentDateTime = new Date(currentDateTime.getTime() + (intervalMinutes * 60000));
                });

                saveProjects();
                announce(`전체 스케줄이 생성되었습니다 (${currentProject.matches.length}경기)`);
                modal.remove();

        // ========== 스케줄 검색 함수들 ==========
        
        // 기존 경기 데이터에 스케줄 필드 추가 (호환성)
        function initializeScheduleFields() {
            projects.forEach(project => {
                if (!project.matches) return;
                
                project.matches.forEach(match => {
                    // 스케줄 필드가 없는 기존 경기에 기본값 설정
                    if (match.scheduledDate === undefined) match.scheduledDate = null;
                    if (match.scheduledTime === undefined) match.scheduledTime = null;
                    if (match.estimatedDuration === undefined) match.estimatedDuration = 30;
                    if (match.courtName === undefined) match.courtName = '';
                    if (match.mainRefereeName === undefined) match.mainRefereeName = '';
                    if (match.round === undefined) match.round = '';
                    if (match.matchOrder === undefined) match.matchOrder = 0;
                });
            });
            saveProjects();
        }
        
        // 페이지 로드 시 스케줄 필드 초기화
        setTimeout(() => {
            initializeScheduleFields();
        }, 2000);
        
        // 참가자 스케줄 검색
        function searchPlayerSchedule() {

            if (!playerName) {

            }
            
            // 이름 저장 옵션 확인
            const saveCheckbox = document.getElementById('save-player-name');
            if (saveCheckbox?.checked) {

            } else {
                localStorage.removeItem('myPlayerName');

            // 정렬 옵션

            const resultsDiv = document.getElementById('player-schedule-results');
            if (!resultsDiv) return;
            
            // 모든 프로젝트에서 해당 선수의 경기 찾기 (시뮬레이션 제외)
            const playerMatches = [];
            projects.forEach(project => {
                // 본선 경기
                if (project.matches) {
                    project.matches.forEach(match => {
                        if (match.player1Name?.includes(playerName) || match.player2Name?.includes(playerName)) {
                            playerMatches.push({
                                ...match,
                                projectName: project.name,
                                projectDate: project.date,

                // 조별 리그 경기

                                const p1 = match.player1 || match.player1Name;
                                const p2 = match.player2 || match.player2Name;

                                        player2Name: p2,

                const bTime = b.scheduledDate ? new Date(`${b.scheduledDate}T${b.scheduledTime || '00:00'}`) : new Date(0);

            // 다음 경기 카드 생성

        // 빠른 프로젝트 생성
        function createQuickProject() {
            const name = document.getElementById('qp-name').value.trim();
            if (!name) {
                alert('프로젝트 이름을 입력해주세요.');
                return;
            }
            
            const participantsText = document.getElementById('qp-participants').value.trim();
            if (!participantsText) {
                alert('참가자를 입력해주세요.');
                return;
            }
            
            // 참가자 파싱 (줄바꿈 또는 쉼표로 구분)
            const participants = participantsText
                .split(/[\n,]+/)
                .map(p => p.trim())
                .filter(p => p.length > 0);
            
            if (participants.length < 2) {
                alert('최소 2명 이상의 참가자가 필요합니다.');
                return;
            }
            
            const type = document.getElementById('qp-type').value;
            const sets = type === 'team' ? 1 : parseInt(document.getElementById('qp-sets').value);
            const format = document.getElementById('qp-format').value;
            const isTeam = type === 'team';
            const winScore = isTeam ? 31 : 11;
            
            // 프로젝트 생성
            const project = {
                id: Date.now(),
                name: name,
                date: new Date().toISOString().split('T')[0],
                location: '',
                competitionType: isTeam ? 'team' : 'individual',
                players: isTeam ? [] : participants,
                teams: isTeam ? participants.map(t => ({ name: t, players: [] })) : [],
                tournamentType: format === 'full-league' ? 'group-only' : 'knockout-only',
                groups: [],
                matches: [],
                preliminarySets: sets,
                finalsSets: sets,
                createdAt: new Date().toISOString(),
                isQuickProject: true
            };
            
            // 경기 생성
            if (format === 'full-league') {
                // 풀리그: 모든 조합
                for (let i = 0; i < participants.length; i++) {
                    for (let j = i + 1; j < participants.length; j++) {
                        const match = {
                            id: Date.now() + i * 100 + j,
                            player1Name: participants[i],
                            player2Name: participants[j],
                            type: isTeam ? 'team' : 'individual',
                            sets: sets,
                            winScore: winScore,
                            currentSet: 1,
                            setScores: [{ player1: 0, player2: 0 }],
                            currentServe: 'player1',
                            serveCount: 0,
                            serveSelected: false,
                            timeouts: { player1: 1, player2: 1 },
                            history: [],
                            status: 'pending',
                            refereePin: generatePin()
                        };
                        project.matches.push(match);
                    }
                }
            } else {
                // 토너먼트: 순서대로 매칭
                const shuffled = [...participants];
                // 랜덤 섞기
                for (let i = shuffled.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                }
                
                for (let i = 0; i < shuffled.length - 1; i += 2) {
                    const match = {
                        id: Date.now() + i,
                        player1Name: shuffled[i],
                        player2Name: shuffled[i + 1] || 'BYE',
                        type: isTeam ? 'team' : 'individual',
                        sets: sets,
                        winScore: winScore,
                        currentSet: 1,
                        setScores: [{ player1: 0, player2: 0 }],
                        currentServe: 'player1',
                        serveCount: 0,
                        serveSelected: false,
                        timeouts: { player1: 1, player2: 1 },
                        history: [],
                        status: 'pending',
                        bracketRound: 1,
                        bracketMatchNum: i / 2 + 1,
                        refereePin: generatePin()
                    };
                    project.matches.push(match);
                }
            }
            
            // 프로젝트 저장
            projects.push(project);
            saveProjects();
            
            // 생성된 프로젝트로 이동
            currentProject = project;
            announce(`${project.name} 프로젝트가 생성되었습니다. ${project.matches.length}경기`);
            goTo('project-list');
        }

        // 심판 연습 모드 경기 시작
        function startPracticeMatch() {

        // 연습 경기 기록 저장 (Firebase + 로컬)
        // 실시간 연습 경기 관람
        function watchLiveMatch(matchId) {
            // 프로젝트에서 경기 찾기
            for (const project of projects) {
                const match = project.matches?.find(m => m.id === matchId);
                if (match) {
                    currentProject = project;
                    currentMatch = match;
                    isAuthenticated = false; // 관람 모드
                    userRole = 'viewer';
                    
                    // Firebase 실시간 리스너 설정
                    if (database && match.isShared) {
                        database.ref('liveMatches/' + matchId).on('value', (snapshot) => {
                            const liveData = snapshot.val();
                            if (liveData && currentMatch && currentMatch.id === matchId) {
                                // 실시간 데이터로 경기 상태 업데이트
                                Object.assign(currentMatch, liveData);
                                render();
                            }
                        });
                    }
                    
                    screen = 'match';
                    announce(`${match.player1Name} 대 ${match.player2Name} 경기 관람 시작`);
                    render();
                    return;
                }
            }
            alert('경기를 찾을 수 없습니다.');
        }
        
        // 연습 경기 개별 삭제
        function deletePracticeMatch(matchId) {
            if (!confirm('이 연습 경기 기록을 삭제하시겠습니까?')) return;
            
            // 프로젝트에서 경기 찾아서 삭제
            for (const project of projects) {
                if (project.isPractice && project.matches) {
                    const matchIndex = project.matches.findIndex(m => m.id === matchId);
                    if (matchIndex >= 0) {
                        project.matches.splice(matchIndex, 1);
                        
                        // 프로젝트에 경기가 없으면 프로젝트도 삭제
                        if (project.matches.length === 0) {
                            const projectIndex = projects.findIndex(p => p.id === project.id);
                            if (projectIndex >= 0) {
                                projects.splice(projectIndex, 1);
                            }
                        }
                        
                        saveProjects();
                        
                        // Firebase에서도 삭제
                        if (database) {
                            database.ref('liveMatches/' + matchId).remove();
                        }
                        
                        announce('연습 경기가 삭제되었습니다');
                        render();
                        return;
                    }
                }
            }
        }
        
        // 완료된 연습 경기 전체 삭제
        function deleteAllPracticeMatches() {
            const completedCount = projects
                .filter(p => p.isPractice && p.isShared)
                .flatMap(p => p.matches || [])
                .filter(m => m.status === 'completed' && m.isShared).length;
            
            if (completedCount === 0) {
                alert('삭제할 완료된 경기가 없습니다.');
                return;
            }
            
            if (!confirm(`완료된 연습 경기 ${completedCount}개를 모두 삭제하시겠습니까?\n\n이 작업은 되돌릴 수 없습니다.`)) return;
            
            // 완료된 연습 경기 삭제
            projects.forEach(project => {
                if (project.isPractice && project.matches) {
                    const completedMatches = project.matches.filter(m => m.status === 'completed' && m.isShared);
                    
                    // Firebase에서도 삭제
                    if (database) {
                        completedMatches.forEach(m => {
                            database.ref('liveMatches/' + m.id).remove();
                        });
                    }
                    
                    // 완료된 경기 제거
                    project.matches = project.matches.filter(m => !(m.status === 'completed' && m.isShared));
                }
            });
            
            // 경기가 없는 연습 프로젝트 제거
            projects = projects.filter(p => !p.isPractice || (p.matches && p.matches.length > 0));
            
            saveProjects();
            announce(`완료된 연습 경기 ${completedCount}개가 삭제되었습니다`);
            render();
        }
        
        // 실시간 경기 데이터 업데이트 (점수 변경 시 호출)
        function updateLiveMatch() {
            if (!currentMatch) return;
            
            // 로컬 저장 및 프로젝트 업데이트
            updateLiveMatchStatus(currentMatch);
            
            // Firebase 실시간 동기화 (공유된 경기만)
            if (currentMatch.isShared) {
                syncLiveMatchToFirebase(currentMatch);
            }
        }
        
        function savePracticeResult(silent = false) {
            if (!currentMatch) return;
            
            const practiceHistory = JSON.parse(localStorage.getItem('practiceHistory') || '[]');
            
            // 중복 저장 방지
            const exists = practiceHistory.some(m => m.id === currentMatch.id);
            if (exists) {
                if (!silent) alert('이미 저장된 기록입니다.');
                return;
            }
            
            // 저장할 데이터
            const matchRecord = {
                id: currentMatch.id,
                player1Name: currentMatch.player1Name,
                player2Name: currentMatch.player2Name,
                setScores: currentMatch.setScores,
                history: currentMatch.history,
                winner: currentMatch.winner,
                finishedAt: currentMatch.finishedAt || new Date().toISOString(),
                sets: currentMatch.sets,
                matchType: 'practice' // ✨ 구분 필드
            };
            
            // 로컬에 저장
            practiceHistory.push(matchRecord);
            localStorage.setItem('practiceHistory', JSON.stringify(practiceHistory));
            
            // ✨ Firebase에도 저장
            savePracticeToFirebase(matchRecord);
            
            if (!silent) {
                announce('기록이 저장되었습니다');
                alert('기록이 저장되었습니다!');
            }
        }
        
        // ✨ 연습 경기를 Firebase에 저장
        function savePracticeToFirebase(matchRecord) {
            if (!database || !userId) {
                // Firebase 미연결 - 오프라인 큐에 추가
                const queue = JSON.parse(localStorage.getItem('offlineQueue') || '[]');
                queue.push({
                    type: 'practiceMatch',
                    userId: userId,
                    data: matchRecord,
                    timestamp: Date.now()
                });
                localStorage.setItem('offlineQueue', JSON.stringify(queue));
                console.log('📴 연습 경기 오프라인 큐에 추가');
                return;
            }
            
            try {
                if (!isOffline) {
                    // Firebase에 저장
                    const matchId = 'practice_' + matchRecord.id;
                    database.ref(`practiceMatches/${userId}/${matchId}`).set(matchRecord);
                    console.log('Firebase에 연습 경기 저장:', matchId);
                } else {
                    // 오프라인 큐에 추가
                    const queue = JSON.parse(localStorage.getItem('offlineQueue') || '[]');
                    queue.push({
                        type: 'practiceMatch',
                        userId: userId,
                        matchId: 'practice_' + matchRecord.id,
                        data: matchRecord,
                        timestamp: Date.now()
                    });
                    localStorage.setItem('offlineQueue', JSON.stringify(queue));
                    console.log('📴 연습 경기 오프라인 큐에 추가');
                }
            } catch (error) {
                console.error('연습 경기 Firebase 저장 실패:', error);
            }
        }
